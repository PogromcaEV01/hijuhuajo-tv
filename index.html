<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heisenberg TV 😏</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #2a2a2a 0%, #000000 100%);
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .tv-container {
      background: #111;
      padding: 16px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 0 2px #333;
    }

    .tv-screen {
      position: relative;
      width: 70vw;
      max-width: 1225px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,1);
      cursor: default;
    }

    .tv-screen.hide-cursor {
      cursor: none;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain; 
      display: block;
    }

    /* --- STYL NAKŁADKI DO PRZEJŚĆ --- */
    #transition-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
    }

    #info {
      position: absolute;
      top: 15px; 
      left: 15px;
      color: white;
      font-size: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      padding: 8px 12px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: opacity 0.3s ease;
    }

    #info.hidden-info {
      opacity: 0;
      pointer-events: none;
    }

    #custom-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
      display: flex;
      align-items: center;
      padding: 10px 15px 8px 15px;
      box-sizing: border-box;
      color: white;
      transition: opacity 0.8s ease;
      opacity: 0;
      z-index: 20;
    }

    #custom-controls.active {
      opacity: 1;
    }

    .ctrl-icon {
      fill: #ffffff;
      width: 20px;
      height: 20px;
      cursor: pointer;
      transition: fill 0.2s, opacity 0.2s;
      margin: 0 8px;
    }

    .ctrl-icon:hover {
      fill: #00ffcc;
    }

    .vol-wrapper {
      display: flex;
      align-items: center;
    }

    .slider-container {
      width: 0;
      opacity: 0;
      overflow: hidden;
      transition: width 0.3s ease, opacity 0.3s ease;
      display: flex;
      align-items: center;
    }

    .vol-wrapper:hover .slider-container {
      width: 65px;
      opacity: 1;
    }

    #volume-slider {
      width: 55px;
      cursor: pointer;
      margin-left: 5px;
    }

    #progress-container {
      flex-grow: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      margin: 0 15px;
      position: relative;
      pointer-events: none; 
    }

    #progress-bar {
      height: 100%;
      background: #ffffff;
      width: 0%;
      position: relative;
    }

    #progress-thumb {
      width: 10px;
      height: 10px;
      background: #ffffff;
      border-radius: 50%;
      position: absolute;
      right: -5px;
      top: -3px;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
    }

    #time-display {
      font-size: 12px;
      font-family: sans-serif;
      font-weight: normal;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      margin-right: 12px;
    }

    .menu-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    #settings-menu {
      position: absolute;
      bottom: 35px;
      right: 0;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 6px;
      padding: 5px 0;
      display: none;
      flex-direction: column;
      min-width: 150px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
    }

    #settings-menu.show {
      display: flex;
    }

    .menu-item {
      padding: 10px 15px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #00ffcc;
    }
  </style>
</head>

<body>

<div class="tv-container">
  <div class="tv-screen" id="tv-screen">
    <video id="player" autoplay muted></video>
    <canvas id="transition-overlay"></canvas>
    <div id="info">Inicjalizacja systemu...</div>

    <div id="custom-controls">
      
      <div class="vol-wrapper">
        <svg id="btn-mute" class="ctrl-icon" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <div class="slider-container">
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
        </div>
      </div>

      <div id="progress-container">
        <div id="progress-bar">
          <div id="progress-thumb"></div>
        </div>
      </div>

      <span id="time-display">-0:00</span>

      <svg id="btn-fullscreen" class="ctrl-icon" viewBox="0 0 24 24">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
      </svg>

      <div class="menu-wrapper">
        <svg id="btn-menu" class="ctrl-icon" viewBox="0 0 24 24">
          <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
        <div id="settings-menu">
          <div class="menu-item" id="btn-schedule">ramówka</div>
          <div class="menu-item" id="btn-pip">obraz w obrazie</div>
          <div class="menu-item" id="btn-toggle-info">ukryj informacje</div>
          <div class="menu-item" id="btn-mobile-fullscreen" style="display: none;">pełny ekran</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
let scheduleConfig = [];
let videosDB = {}; 
const ambientFile = "https://aelwyd.space/ambient.mp4";
let currentIsAmbient = false;

const video = document.getElementById("player");
const progressBar = document.getElementById("progress-bar");
const timeDisplay = document.getElementById("time-display");
const btnMute = document.getElementById("btn-mute");
const volumeSlider = document.getElementById("volume-slider");
const btnFullscreen = document.getElementById("btn-fullscreen");
const tvScreen = document.getElementById("tv-screen");
const customControls = document.getElementById("custom-controls");
const infoDiv = document.getElementById("info");

const btnMenu = document.getElementById("btn-menu");
const settingsMenu = document.getElementById("settings-menu");
const btnSchedule = document.getElementById("btn-schedule");
const btnPip = document.getElementById("btn-pip");
const btnToggleInfo = document.getElementById("btn-toggle-info");
const btnMobileFullscreen = document.getElementById("btn-mobile-fullscreen");

let activityTimeout;
let isHoveringControls = false;

customControls.addEventListener("mouseenter", () => isHoveringControls = true);
customControls.addEventListener("mouseleave", () => isHoveringControls = false);

function resetActivityTimer() {
  tvScreen.classList.remove("hide-cursor");
  customControls.classList.add("active");
  
  clearTimeout(activityTimeout);
  
  activityTimeout = setTimeout(() => {
    if (!isHoveringControls) {
      tvScreen.classList.add("hide-cursor");
      customControls.classList.remove("active");
      settingsMenu.classList.remove("show");
    }
  }, 2000);
}

tvScreen.addEventListener("mousemove", resetActivityTimer);
tvScreen.addEventListener("click", resetActivityTimer);

tvScreen.addEventListener("mouseleave", () => {
  clearTimeout(activityTimeout);
  tvScreen.classList.remove("hide-cursor");
  customControls.classList.remove("active");
  settingsMenu.classList.remove("show");
});

video.addEventListener("pause", () => {
    video.play().catch(() => {});
});

function formatTimeRemaining(currentTime, duration) {
  if (isNaN(duration) || isNaN(currentTime)) return "-0:00";
  const remaining = Math.max(0, duration - currentTime);
  const m = Math.floor(remaining / 60);
  const s = Math.floor(remaining % 60);
  return `-${m}:${s.toString().padStart(2, '0')}`;
}

video.addEventListener("timeupdate", () => {
  if (video.duration) {
    const percent = (video.currentTime / video.duration) * 100;
    progressBar.style.width = `${percent}%`;
    timeDisplay.innerText = formatTimeRemaining(video.currentTime, video.duration);
  }
});

btnMute.addEventListener("click", () => {
  video.muted = !video.muted;
  btnMute.style.opacity = video.muted ? "0.5" : "1";
  volumeSlider.value = video.muted ? 0 : video.volume;
});

volumeSlider.addEventListener("input", (e) => {
  video.volume = e.target.value;
  if (video.volume > 0) {
    video.muted = false;
    btnMute.style.opacity = "1";
  } else {
    video.muted = true;
    btnMute.style.opacity = "0.5";
  }
});

btnMenu.addEventListener("click", (e) => {
  e.stopPropagation();
  settingsMenu.classList.toggle("show");
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".menu-wrapper")) {
    settingsMenu.classList.remove("show");
  }
});

btnSchedule.addEventListener("click", () => {
  window.location.href = "ramowka.html"; 
});

btnPip.addEventListener("click", async () => {
  try {
    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
    } else if (document.pictureInPictureEnabled) {
      await video.requestPictureInPicture();
    }
  } catch (err) {
    console.error("Błąd Picture-in-Picture: ", err);
  }
  settingsMenu.classList.remove("show");
});

btnToggleInfo.addEventListener("click", () => {
  infoDiv.classList.toggle("hidden-info");
  if (infoDiv.classList.contains("hidden-info")) {
    btnToggleInfo.innerText = "pokaż informacje";
  } else {
    btnToggleInfo.innerText = "ukryj informacje";
  }
  settingsMenu.classList.remove("show");
});

const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if (isMobileDevice) {
  btnMobileFullscreen.style.display = "block";
}

btnMobileFullscreen.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    tvScreen.requestFullscreen().catch(err => {
      console.error(`Błąd wejścia w tryb pełnoekranowy: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
  settingsMenu.classList.remove("show");
});

document.addEventListener("fullscreenchange", () => {
  if (document.fullscreenElement) {
    btnMobileFullscreen.innerText = "W ramce";
  } else {
    btnMobileFullscreen.innerText = "Pełny ekran";
  }
});

btnFullscreen.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const elementToFullscreen = isMobile ? document.documentElement : tvScreen;

    elementToFullscreen.requestFullscreen().catch(err => {
      console.error(`Błąd wejścia w tryb pełnoekranowy: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
});

video.addEventListener("loadedmetadata", () => {
  timeDisplay.innerText = formatTimeRemaining(video.currentTime, video.duration);
});

function getCycleDay() {
  const now = new Date();
  const localEpochMs = now.getTime() - (now.getTimezoneOffset() * 60000);
  return (Math.floor(localEpochMs / 86400000) % 182) + 1;
}

async function loadCSV() {
  const res = await fetch("anime_lista.csv");
  const text = await res.text();
  const lines = text.trim().split('\n');
  const db = {};

  for(let i = 1; i < lines.length; i++) {
    const row = lines[i];
    const cols = row.split('";"').map(s => s.replace(/^"|"$/g, ''));
    if (cols.length < 3) continue;

    const fullPath = cols[0];
    const fileName = cols[1];
    const ext = cols[2];

    const pathParts = fullPath.split('\\');
    const folderName = pathParts[pathParts.length - 1];

    if (!db[folderName]) db[folderName] = [];
    db[folderName].push(fileName + ext);
  }

  for (const folder in db) {
    db[folder].sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
  }
  return db;
}

async function startTV() {
  try {
    const res = await fetch("ramowka.json");
    scheduleConfig = await res.json();
    document.getElementById("info").innerText = "Pobieranie bazy wideo...";
    videosDB = await loadCSV();
  } catch (e) {
    document.getElementById("info").innerText = "BŁĄD ŁADOWANIA DANYCH 💀";
    console.error(e);
    return;
  }
  sync();
  setInterval(sync, 5000);
}

function playAmbient() {
  if (currentIsAmbient) return;
  
  currentIsAmbient = true;
  video.src = ambientFile;
  video.loop = true;
  video.load();
  
  video.onloadedmetadata = () => {
    const now = new Date();
    const offsetSec = (now.getMinutes() % 30) * 60 + now.getSeconds();
    const epDur = parseFloat(video.dataset.epDuration || 1380); 
    video.currentTime = Math.max(0, offsetSec - epDur) % (video.duration || 1);
    video.play().catch(() => {});
  };
}

function playAmbientWithTransition() {
  if (currentIsAmbient) return;
  
  const overlay = document.getElementById("transition-overlay");
  const ctx = overlay.getContext("2d");

  if (video.videoWidth > 0 && video.videoHeight > 0) {
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, overlay.width, overlay.height);

    overlay.style.transition = "none";
    overlay.style.opacity = "1";

    void overlay.offsetWidth;

    overlay.style.transition = "opacity 2s ease";
    overlay.style.opacity = "0";
  }

  playAmbient();
}

function sync() {
  const now = new Date();
  const cycleDay = getCycleDay();
  const currentDOW = ((cycleDay - 1) % 7) + 1; 
  
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const isSecondHalf = m >= 30;

  const hourConfigs = scheduleConfig.filter(x => x.hour === h);
  let hourConfig = hourConfigs.find(x => !x.days || x.days.includes(currentDOW));
  if (!hourConfig) hourConfig = hourConfigs[0] || scheduleConfig[0];

  const seriesFolders = hourConfig.folders || [hourConfig.folder];
  const programKey = seriesFolders.join('|');

  let allEpisodes = [];
  for (const f of seriesFolders) {
    if (videosDB[f]) {
      videosDB[f].forEach(fileName => {
        allEpisodes.push({ folder: f, file: fileName });
      });
    }
  }

  if (allEpisodes.length === 0) {
    document.getElementById("info").innerText = `BRAK FILMÓW W FOLDERACH: ${seriesFolders.join(', ')} 💀`;
    return;
  }

  const runsOnDOW = (cfg, dow) => !cfg.days || cfg.days.includes(dow);
  
  const programConfigs = scheduleConfig.filter(cfg => {
      const f = cfg.folders || [cfg.folder];
      return f.join('|') === programKey;
  });

  let totalPastEpisodes = 0;
  for (let d = 1; d < cycleDay; d++) {
      const dow = ((d - 1) % 7) + 1;
      for (const cfg of programConfigs) {
          if (runsOnDOW(cfg, dow)) {
              totalPastEpisodes++;
          }
      }
  }

  const todaysConfigs = programConfigs.filter(cfg => runsOnDOW(cfg, currentDOW)).sort((a,b) => a.hour - b.hour);
  
  const H = todaysConfigs.length;
  if (H === 0) return;

  const i = todaysConfigs.findIndex(cfg => cfg.hour === h);
  const j = isSecondHalf ? 1 : 0;
  const slotIndex = i * 2 + j;

  const targetIndex = totalPastEpisodes - H + slotIndex;
  const safeIndex = ((targetIndex % allEpisodes.length) + allEpisodes.length) % allEpisodes.length;

  const currentEpisode = allEpisodes[safeIndex];
  const currentFolder = currentEpisode.folder;
  const currentFileName = currentEpisode.file;

  const videoUrl = `https://aelwyd.space/${encodeURIComponent(currentFolder)}/${encodeURIComponent(currentFileName)}`;
  
  const slotId = `${currentFolder}-${currentFileName}-${slotIndex}`;
  const offsetSec = (m % 30) * 60 + s;

  if (video.dataset.slotId !== slotId) {
    video.dataset.slotId = slotId;
    video.src = videoUrl;
    currentIsAmbient = false;
    video.load();

    video.onloadedmetadata = () => {
      video.dataset.epDuration = video.duration;
      timeDisplay.innerText = formatTimeRemaining(video.currentTime, video.duration);

      if (offsetSec >= video.duration) {
        playAmbient();
      } else {
        video.currentTime = offsetSec;
        video.play().catch(() => {});
      }
    };

    video.onended = () => {
      if (!currentIsAmbient) playAmbientWithTransition();
    };
  } else {
    if (!currentIsAmbient && video.readyState >= 1) {
      if (offsetSec >= parseFloat(video.dataset.epDuration || 99999)) {
        playAmbientWithTransition();
      }
    }
  }

  const formatTimeStr = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
  const typeLabel = currentIsAmbient ? '🌿 ambient' : '📺 trwa';
  const episodeInfo = slotIndex < H ? 'w' : 'd';
  const episodeIndexInCurrentSeries = videosDB[currentFolder].indexOf(currentFileName) + 1;

  document.getElementById("info").innerText =
    `▶ dzień ${cycleDay}/182 | ${formatTimeStr} | ${hourConfig.title} | ${currentFolder} odc. ${episodeIndexInCurrentSeries} ${episodeInfo}`;
}

startTV();
</script>
</body>
</html>
