<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Heisenberg TV 😏</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-family: Arial;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>

<body>

<video id="player" autoplay muted controls style="width:100vw; height:100vh;"></video>
<div id="info"></div>

<script>
let schedule = [];

async function startTV() {
  const res = await fetch("schedule.json");
  schedule = await res.json();

  syncAndPlay();

  // 🔁 pełna synchronizacja co 5 sekund
  setInterval(syncAndPlay, 5000);
}

function getSecondsNow() {
  const now = new Date();
  return now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
}

function timeToSeconds(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 3600 + m * 60;
}

function syncAndPlay() {
  const nowSec = getSecondsNow();

  let current = schedule[0];

  for (let i = 0; i < schedule.length; i++) {
    if (timeToSeconds(schedule[i].time) <= nowSec) {
      current = schedule[i];
    }
  }

  const start = timeToSeconds(current.time);
  let offset = nowSec - start;

  const video = document.getElementById("player");

  if (video.src !== current.file) {
    video.src = current.file;
    video.load();
  }

  video.addEventListener("loadedmetadata", () => {
    if (offset > video.duration) {
      offset = offset % video.duration;
    }
    video.currentTime = offset;
  });

  video.play().catch(() => {});

  document.getElementById("info").innerText =
    `▶ ${current.title} | offset: ${offset}s`;
}

startTV();
</script>

</body>
</html>
