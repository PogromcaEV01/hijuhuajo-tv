<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Heisenberg TV 😏</title>

  <style>
    body {
      margin: 0;
      /* Eleganckie tło zamiast grobowej czerni */
      background: linear-gradient(135deg, #16213e 0%, #0f3443 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Subtelna siatka w tle, żeby przestrzeń wokół TV "żyła" */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
    }

    /* Zewnętrzna obudowa ekranu (jaśniejsza ramka + Ambilight) */
    .tv-container {
      position: relative;
      /* Kolor obudowy przypominający ciemnoszary sprzęt RTV */
      background: linear-gradient(to bottom, #3a3a40, #1c1c20);
      padding: 18px 18px 26px 18px; /* Dolna ramka trochę grubsza */
      border-radius: 20px;
      /* Efekt "Ambilight" - kolorowa poświata z tyłu (Heisenbergowy zielony i niebieski) */
      box-shadow: 
        0 20px 50px rgba(0,0,0,0.6), 
        0 0 80px rgba(46, 204, 113, 0.3), /* Zielona aura */
        -50px 0 100px rgba(52, 152, 219, 0.2), /* Niebieska aura po lewej */
        inset 0 2px 2px rgba(255,255,255,0.15); /* Błysk na górnej krawędzi ramki */
    }

    /* Wewnętrzny ekran ograniczający wideo */
    .tv-screen {
      position: relative;
      width: 80vw;
      max-width: 1400px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,1);
      border: 2px solid #0a0a0a;
    }

    /* Delikatne paski TV (scanlines) - dodają fajnego klimatu. Jeśli nie lubisz, możesz usunąć ten blok */
    .tv-screen::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
      background-size: 100% 4px;
      z-index: 5;
      pointer-events: none; /* Pozwala klikać przez paski w samo wideo */
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* Ukrycie natywnego przycisku Play/Pause w przeglądarkach WebKit/Blink */
    video::-webkit-media-controls-play-button {
      display: none !important;
    }

    /* Zablokowanie klikania w pasek postępu (timeline) */
    video::-webkit-media-controls-timeline {
      pointer-events: none !important;
    }

    /* Pływające informacje (nowoczesny Glassmorphism) */
    #info {
      position: absolute;
      top: 20px; 
      left: 20px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      z-index: 10;
      /* Efekt matowego szkła */
      background: rgba(20, 20, 25, 0.6);
      padding: 10px 16px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div class="tv-container">
  <div class="tv-screen">
    <video id="player" autoplay muted controls controlsList="nodownload noplaybackrate"></video>
    <div id="info">Inicjalizacja systemu...</div>
  </div>
</div>

<script>
let scheduleConfig = [];
let videosDB = {}; 
const ambientFile = "https://aelwyd.space/ambient.mp4";
let currentIsAmbient = false;

const videoPlayerElement = document.getElementById("player");
videoPlayerElement.addEventListener("pause", () => {
    videoPlayerElement.play().catch(() => {});
});

function getCycleDay() {
  const now = new Date();
  const localEpochMs = now.getTime() - (now.getTimezoneOffset() * 60000);
  return (Math.floor(localEpochMs / 86400000) % 30) + 1;
}

async function loadCSV() {
  const res = await fetch("ramowka.csv");
  const text = await res.text();
  
  const lines = text.trim().split('\n');
  const db = {};

  for(let i = 1; i < lines.length; i++) {
    const row = lines[i];
    const cols = row.split('";"').map(s => s.replace(/^"|"$/g, ''));
    if (cols.length < 3) continue;

    const fullPath = cols[0];
    const fileName = cols[1];
    const ext = cols[2];

    const pathParts = fullPath.split('\\');
    const folderName = pathParts[pathParts.length - 1];

    if (!db[folderName]) db[folderName] = [];
    db[folderName].push(fileName + ext);
  }

  for (const folder in db) {
    db[folder].sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
  }

  return db;
}

async function startTV() {
  try {
    const res = await fetch("schedule.json");
    scheduleConfig = await res.json();
    
    document.getElementById("info").innerText = "Pobieranie bazy wideo...";
    videosDB = await loadCSV();
  } catch (e) {
    document.getElementById("info").innerText = "BŁĄD ŁADOWANIA DANYCH 💀";
    console.error(e);
    return;
  }

  sync();
  setInterval(sync, 5000);
}

function playAmbient() {
  const video = document.getElementById("player");
  if (currentIsAmbient) return;
  
  currentIsAmbient = true;
  video.src = ambientFile;
  video.loop = true;
  video.load();
  
  video.onloadedmetadata = () => {
    const now = new Date();
    const offsetSec = (now.getMinutes() % 30) * 60 + now.getSeconds();
    const epDur = parseFloat(video.dataset.epDuration || 1380); 
    video.currentTime = Math.max(0, offsetSec - epDur) % (video.duration || 1);
    video.play().catch(() => {});
  };
}

function sync() {
  const now = new Date();
  const cycleDay = getCycleDay();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const isSecondHalf = m >= 30;

  const hourConfig = scheduleConfig.find(x => x.hour === h) || scheduleConfig[0];
  const folder = hourConfig.folder;
  const seriesVideos = videosDB[folder];

  if (!seriesVideos || seriesVideos.length === 0) {
    document.getElementById("info").innerText = `BRAK FILMÓW W FOLDERZE: ${folder} 💀`;
    return;
  }

  let targetIndex = cycleDay - 1; 
  if (isSecondHalf) {
    targetIndex += 1; 
  }

  const safeIndex = targetIndex % seriesVideos.length;
  const currentFileName = seriesVideos[safeIndex];

  const videoUrl = `https://aelwyd.space/${encodeURIComponent(folder)}/${encodeURIComponent(currentFileName)}`;
  
  const slotId = `${folder}-day${cycleDay}-${isSecondHalf ? 'new' : 'old'}`;
  const video = document.getElementById("player");
  const offsetSec = (m % 30) * 60 + s;

  if (video.dataset.slotId !== slotId) {
    video.dataset.slotId = slotId;
    video.src = videoUrl;
    currentIsAmbient = false;
    video.load();

    video.onloadedmetadata = () => {
      video.dataset.epDuration = video.duration;
      
      if (offsetSec >= video.duration) {
        playAmbient();
      } else {
        video.currentTime = offsetSec;
        video.play().catch(() => {});
      }
    };

    video.onended = () => {
      if (!currentIsAmbient) playAmbient();
    };

  } else {
    if (!currentIsAmbient && video.readyState >= 1) {
      if (offsetSec >= parseFloat(video.dataset.epDuration || 99999)) {
        playAmbient();
      }
    }
  }

  const formatTime = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
  const typeLabel = currentIsAmbient ? '🌿 AMBIENT' : '📺 TRWA';
  const episodeInfo = isSecondHalf ? 'Premiera' : 'Powtórka z wczoraj';

  document.getElementById("info").innerText =
    `▶ Dzień ${cycleDay}/30 | ${formatTime} | ${hourConfig.title} | Odc. ${safeIndex + 1} (${episodeInfo}) | ${typeLabel}`;
}

startTV();
</script>
</body>
</html>
