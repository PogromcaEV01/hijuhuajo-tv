<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Heisenberg TV 😏</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
    #info {
      position: absolute;
      bottom: 15px;
      left: 15px;
      color: white;
      font-size: 18px;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      border-radius: 8px;
    }
    /* STYL LOGÓW NA EKRANIE */
    #debug-panel {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 400px;
      max-height: 300px;
      background: rgba(0, 0, 0, 0.8);
      color: #00ff00;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      border-radius: 8px;
      overflow-y: auto;
      z-index: 20;
      border: 1px solid #333;
    }
    .log-error { color: #ff4444; }
    .log-warn { color: #ffbb33; }
    .log-info { color: #33b5e5; }
  </style>
</head>

<body>
<video id="player" autoplay muted controls></video>
<div id="info">Inicjalizacja systemu...</div>

<!-- PANEL LOGÓW -->
<div id="debug-panel">
  <div style="color: white; border-bottom: 1px solid #555; margin-bottom: 5px; padding-bottom: 5px;">
    <strong>📺 KONSOLA DEBUGOWANIA</strong>
  </div>
</div>

<script>
// ==========================================
// KONFIGURACJA
// ==========================================
const URL_PREFIX = "https://aelwyd.space"; 

// 🔥 Jeśli wszystkie foldery w Cloudflare mają dopisek "_small" na końcu, zostaw to. 
// Jeśli tylko AoT to ma, powinieneś zmienić to w pliku schedule.json lub CSV na sztywno.
const FOLDER_SUFFIX = "_small"; 
// ==========================================

let scheduleConfig = [];
let videosDB = {}; 
const ambientFile = `${URL_PREFIX}/ambient.mp4`;
let currentIsAmbient = false;

// Funkcja logująca na ekran
function screenLog(msg, type = 'info') {
  const panel = document.getElementById('debug-panel');
  const div = document.createElement('div');
  const time = new Date().toLocaleTimeString();
  div.className = `log-${type}`;
  div.innerText = `[${time}] ${msg}`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight; // Auto-scroll w dół
}

function getCycleDay() {
  const now = new Date();
  const localEpochMs = now.getTime() - (now.getTimezoneOffset() * 60000);
  return (Math.floor(localEpochMs / 86400000) % 30) + 1;
}

async function loadCSV() {
  screenLog("Ładowanie pliku ramowka.csv...");
  try {
    const res = await fetch("ramowka.csv");
    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
    const text = await res.text();
    
    const lines = text.trim().split('\n');
    const db = {};

    for(let i = 1; i < lines.length; i++) {
      const row = lines[i];
      const cols = row.split('";"').map(s => s.replace(/^"|"$/g, ''));
      if (cols.length < 3) continue;

      const fullPath = cols[0];
      const fileName = cols[1];
      const ext = cols[2];

      const pathParts = fullPath.split('\\');
      const folderName = pathParts[pathParts.length - 1];

      if (!db[folderName]) db[folderName] = [];
      db[folderName].push(fileName + ext);
    }

    for (const folder in db) {
      db[folder].sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
    }
    
    screenLog(`Wczytano ${Object.keys(db).length} folderów z CSV.`, 'info');
    return db;
  } catch (e) {
    screenLog(`Błąd wczytywania CSV: ${e.message}`, 'error');
    throw e;
  }
}

async function startTV() {
  try {
    screenLog("Pobieranie schedule.json...");
    const res = await fetch("schedule.json");
    if (!res.ok) throw new Error(`HTTP status: ${res.status}`);
    scheduleConfig = await res.json();
    
    document.getElementById("info").innerText = "Pobieranie bazy wideo...";
    videosDB = await loadCSV();
  } catch (e) {
    document.getElementById("info").innerText = "BŁĄD ŁADOWANIA DANYCH 💀";
    screenLog(`StartTV error: ${e.message}`, 'error');
    return;
  }

  sync();
  setInterval(sync, 5000);
}

function playAmbient() {
  const video = document.getElementById("player");
  if (currentIsAmbient) return;
  
  screenLog(`Uruchamianie Ambient: ${ambientFile}`, 'warn');
  currentIsAmbient = true;
  video.src = ambientFile;
  video.loop = true;
  video.load();
  
  video.onloadedmetadata = () => {
    const now = new Date();
    const offsetSec = (now.getMinutes() % 30) * 60 + now.getSeconds();
    const epDur = parseFloat(video.dataset.epDuration || 1380); 
    video.currentTime = Math.max(0, offsetSec - epDur) % (video.duration || 1);
    video.play().catch(e => screenLog(`Ambient play blocked: ${e.message}`, 'error'));
  };
  
  video.onerror = () => {
    screenLog(`Błąd odtwarzania ambientu! 404?`, 'error');
  };
}

function sync() {
  const now = new Date();
  const cycleDay = getCycleDay();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const isSecondHalf = m >= 30;
  const hourConfig = scheduleConfig.find(x => x.hour === h) || scheduleConfig[0];
  const folder = hourConfig.folder;
  const seriesVideos = videosDB[folder];

  if (!seriesVideos || seriesVideos.length === 0) {
    document.getElementById("info").innerText = `BRAK FILMÓW W FOLDERZE: ${folder} 💀`;
    return;
  }

  let targetIndex = cycleDay - 1; 
  if (isSecondHalf) {
    targetIndex += 1; 
  }

  const safeIndex = targetIndex % seriesVideos.length;
  const currentFileName = seriesVideos[safeIndex];

  // 🔥 TUTAJ DODAJEMY _small DO NAZWY FOLDERU Z CSV
  const finalFolderName = folder + FOLDER_SUFFIX;
  
  const videoUrl = `${URL_PREFIX}/${encodeURIComponent(finalFolderName)}/${encodeURIComponent(currentFileName)}`;
  
  const slotId = `${folder}-day${cycleDay}-${isSecondHalf ? 'new' : 'old'}`;
  const video = document.getElementById("player");
  const offsetSec = (m % 30) * 60 + s;

  if (video.dataset.slotId !== slotId) {
    screenLog(`ZMIANA SLOTU na: ${slotId}`);
    screenLog(`LINK: ${videoUrl}`, 'info');
    
    video.dataset.slotId = slotId;
    video.src = videoUrl;
    currentIsAmbient = false;
    video.load();

    video.onloadedmetadata = () => {
      video.dataset.epDuration = video.duration;
      if (offsetSec >= video.duration) {
        screenLog(`Wideo minęło w czasie rzeczywistym -> Ambient`, 'warn');
        playAmbient();
      } else {
        video.currentTime = offsetSec;
        video.play().catch(e => screenLog(`Play blocked: ${e.message}`, 'error'));
      }
    };

    video.onerror = () => {
      screenLog(`BŁĄD ODTWARZANIA! Plik nie istnieje? (Sprawdź link wyżej)`, 'error');
    };

    video.onended = () => {
      if (!currentIsAmbient) {
        screenLog(`Odcinek zakończony naturalnie -> Ambient`);
        playAmbient();
      }
    };

  } else {
    if (!currentIsAmbient && video.readyState >= 1) {
      if (offsetSec >= parseFloat(video.dataset.epDuration || 99999)) {
        screenLog(`Czas bloku przekroczył długość wideo -> Ambient`, 'warn');
        playAmbient();
      }
    }
  }

  const formatTime = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
  const typeLabel = currentIsAmbient ? '🌿 AMBIENT' : '📺 TRWA';
  const episodeInfo = isSecondHalf ? 'Premiera' : 'Powtórka z wczoraj';

  document.getElementById("info").innerText =
    `▶ Dzień ${cycleDay}/30 | ${formatTime} | ${hourConfig.title} | Odc. ${safeIndex + 1} (${episodeInfo}) | ${typeLabel}`;
}

startTV();
</script>
</body>
</html>
