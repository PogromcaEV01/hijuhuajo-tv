<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄▀▄</title>
  <link id="favicon" rel="icon" type="image/png" href="1.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
  
  <style>
    :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-main: #e0e0e0;
        --accent: #bb86fc;
        --accent-hover: #9c4dff;
    }

    html {
        background-color: var(--bg-color);
    }

    body {
      margin: 0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Shadows Into Light', Arial, sans-serif;
      color: var(--text-main);
    }

    /* --- TŁO Z EFEKTAMI 3D (Z RAMÓWKI) --- */
    .bg-wrapper {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        perspective: 1000px; 
        z-index: -1;
        pointer-events: none;
        overflow: hidden; 
    }

    .spotlight-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at center, transparent 0%, #000000 95%);
        box-shadow: inset 0 0 150px rgba(145, 70, 255, 0.2);
        z-index: 1;
    }

    .cyber-grid {
        position: absolute;
        bottom: -50%; left: -50%;
        width: 200%; height: 200%;
        background-image: 
            linear-gradient(rgba(145, 70, 255, 0.8) 2px, transparent 2px),
            linear-gradient(90deg, rgba(145, 70, 255, 0.8) 2px, transparent 2px);
        background-size: 50px 50px;
        transform: rotateX(75deg) translateY(50px) scale(1.2);
        animation: gridWarpSpeed 0.4s linear infinite;
        filter: drop-shadow(0 0 10px #9146ff);
        z-index: 0;
    }

    @keyframes gridWarpSpeed {
        0% { background-position: 0 0; }
        100% { background-position: 0 50px; }
    }

    /* --- ODTWARZACZ TV --- */
    .tv-container {
      background: var(--card-bg);
      padding: 16px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 0 2px #333, 0 0 40px rgba(145, 70, 255, 0.15);
      position: relative;
      z-index: 10;
    }

    .tv-screen {
      position: relative;
      width: 70vw;
      max-width: 1225px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,1);
      cursor: default;
      font-family: Arial, sans-serif; /* Reset fontu dla kontrolek gracza */
    }

    .tv-screen.hide-cursor { cursor: none; }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain; 
      display: block;
    }

    #info {
      position: absolute;
      top: 15px; 
      left: 15px;
      color: white;
      font-size: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      padding: 8px 12px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: opacity 0.3s ease;
      font-family: Arial, sans-serif;
    }

    #info.hidden-info {
      opacity: 0;
      pointer-events: none;
    }

    #custom-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
      display: flex;
      align-items: center;
      padding: 10px 15px 8px 15px;
      box-sizing: border-box;
      color: white;
      transition: opacity 0.8s ease;
      opacity: 0; 
      z-index: 20;
    }

    #custom-controls.active { opacity: 1; }

    .ctrl-icon {
      fill: #ffffff;
      width: 20px;
      height: 20px;
      cursor: pointer;
      transition: fill 0.2s, opacity 0.2s;
      margin: 0 8px;
    }

    .ctrl-icon:hover { fill: var(--accent); }

    .vol-wrapper { display: flex; align-items: center; }

    .slider-container {
      width: 0;
      opacity: 0;
      overflow: hidden;
      transition: width 0.3s ease, opacity 0.3s ease;
      display: flex;
      align-items: center;
    }

    .vol-wrapper:hover .slider-container { width: 65px; opacity: 1; }

    #volume-slider { width: 55px; cursor: pointer; margin-left: 5px; }

    #progress-container {
      flex-grow: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      margin: 0 15px;
      position: relative;
      pointer-events: none; 
    }

    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      position: relative;
    }

    #progress-thumb {
      width: 10px;
      height: 10px;
      background: #ffffff;
      border-radius: 50%;
      position: absolute;
      right: -5px;
      top: -3px;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
    }

    #time-display {
      font-size: 12px;
      font-family: sans-serif;
      font-weight: normal;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      margin-right: 12px;
    }

    .menu-wrapper { position: relative; display: flex; align-items: center; }

    #settings-menu {
      position: absolute;
      bottom: 35px;
      right: 0; 
      background: rgba(20, 20, 20, 0.9);
      border-radius: 6px;
      padding: 5px 0;
      display: none;
      flex-direction: column;
      min-width: 150px;
      border: 1px solid rgba(187, 134, 252, 0.2);
      backdrop-filter: blur(4px);
    }

    #settings-menu.show { display: flex; }

    .menu-item {
      padding: 10px 15px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .menu-item:hover {
      background: rgba(187, 134, 252, 0.15);
      color: var(--accent);
    }
  </style>
</head>

<body>

<div class="bg-wrapper">
    <div class="cyber-grid"></div>
    <div class="spotlight-overlay"></div>
</div>

<div class="tv-container">
  <div class="tv-screen" id="tv-screen">
    <video id="player" autoplay muted></video>
    <div id="info" class="hidden-info">Inicjalizacja systemu...</div>

    <div id="custom-controls">
      
      <div class="vol-wrapper">
        <svg id="btn-mute" class="ctrl-icon" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <div class="slider-container">
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
        </div>
      </div>

      <div id="progress-container">
        <div id="progress-bar">
          <div id="progress-thumb"></div>
        </div>
      </div>

      <span id="time-display">-0:00</span>

      <svg id="btn-fullscreen" class="ctrl-icon" viewBox="0 0 24 24">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
      </svg>

      <div class="menu-wrapper">
        <svg id="btn-menu" class="ctrl-icon" viewBox="0 0 24 24">
          <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
        <div id="settings-menu">
          <div class="menu-item" id="btn-schedule">zobacz ramówkę</div>
          <div class="menu-item" id="btn-pip">obraz w obrazie</div>
          <div class="menu-item" id="btn-toggle-info">pokaż informacje</div>
          <div class="menu-item" id="btn-mobile-fullscreen" style="display: none;">pełny ekran</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// --- ANIMOWANY FAVICON ---
const frames = Array.from({ length: 34 }, (_, index) => `f4gW/${index + 1}.png`);
let favIndex = 0;
const favicon = document.getElementById("favicon");

setInterval(() => {
  favicon.href = frames[favIndex];
  favIndex = (favIndex + 1) % frames.length;
}, 300);

// --- ZMIENNE GLOBALNE TV ---
let idMap = {};
let ramowkaData = [];
const ambientFile = "https://aelwyd.space/ambient.mp4";
let currentIsAmbient = false;

// --- DOM elements TV ---
const video = document.getElementById("player");
const progressBar = document.getElementById("progress-bar");
const timeDisplay = document.getElementById("time-display");
const btnMute = document.getElementById("btn-mute");
const volumeSlider = document.getElementById("volume-slider");
const btnFullscreen = document.getElementById("btn-fullscreen");
const tvScreen = document.getElementById("tv-screen");
const customControls = document.getElementById("custom-controls");
const infoDiv = document.getElementById("info");

const btnMenu = document.getElementById("btn-menu");
const settingsMenu = document.getElementById("settings-menu");
const btnSchedule = document.getElementById("btn-schedule");
const btnPip = document.getElementById("btn-pip");
const btnToggleInfo = document.getElementById("btn-toggle-info");
const btnMobileFullscreen = document.getElementById("btn-mobile-fullscreen");

// --- LOGIKA ZANIKANIA PASKA (AUTO-HIDE) ---
let activityTimeout;
let isHoveringControls = false;

customControls.addEventListener("mouseenter", () => isHoveringControls = true);
customControls.addEventListener("mouseleave", () => isHoveringControls = false);

function resetActivityTimer() {
  tvScreen.classList.remove("hide-cursor");
  customControls.classList.add("active");
  clearTimeout(activityTimeout);
  activityTimeout = setTimeout(() => {
    if (!isHoveringControls) {
      tvScreen.classList.add("hide-cursor");
      customControls.classList.remove("active");
      settingsMenu.classList.remove("show"); 
    }
  }, 2000);
}

tvScreen.addEventListener("mousemove", resetActivityTimer);
tvScreen.addEventListener("click", resetActivityTimer);
tvScreen.addEventListener("mouseleave", () => {
  clearTimeout(activityTimeout);
  tvScreen.classList.remove("hide-cursor");
  customControls.classList.remove("active");
  settingsMenu.classList.remove("show");
});

// --- LOGIKA KONTROLEK ODTWARZACZA ---
video.addEventListener("pause", () => {
    video.play().catch(() => {});
});

function formatTimeRemaining(currentTime, duration) {
  if (isNaN(duration) || isNaN(currentTime)) return "-0:00";
  const remaining = Math.max(0, duration - currentTime);
  const m = Math.floor(remaining / 60);
  const s = Math.floor(remaining % 60);
  return `-${m}:${s.toString().padStart(2, '0')}`;
}

video.addEventListener("timeupdate", () => {
  if (video.duration) {
    const percent = (video.currentTime / video.duration) * 100;
    progressBar.style.width = `${percent}%`;
    timeDisplay.innerText = formatTimeRemaining(video.currentTime, video.duration);
  }
});

video.addEventListener("loadedmetadata", () => {
  timeDisplay.innerText = formatTimeRemaining(video.currentTime, video.duration);
});

btnMute.addEventListener("click", () => {
  video.muted = !video.muted;
  btnMute.style.opacity = video.muted ? "0.5" : "1";
  volumeSlider.value = video.muted ? 0 : video.volume;
});

volumeSlider.addEventListener("input", (e) => {
  video.volume = e.target.value;
  if (video.volume > 0) {
    video.muted = false;
    btnMute.style.opacity = "1";
  } else {
    video.muted = true;
    btnMute.style.opacity = "0.5";
  }
});

btnMenu.addEventListener("click", (e) => {
  e.stopPropagation(); 
  settingsMenu.classList.toggle("show");
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".menu-wrapper")) {
    settingsMenu.classList.remove("show");
  }
});

btnSchedule.addEventListener("click", () => window.location.href = "ramowka.html");

btnPip.addEventListener("click", async () => {
  try {
    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
    } else if (document.pictureInPictureEnabled) {
      await video.requestPictureInPicture();
    }
  } catch (err) {
    console.error("Błąd Picture-in-Picture: ", err);
  }
  settingsMenu.classList.remove("show");
});

btnToggleInfo.addEventListener("click", () => {
  infoDiv.classList.toggle("hidden-info");
  btnToggleInfo.innerText = infoDiv.classList.contains("hidden-info") ? "pokaż informacje" : "ukryj informacje";
  settingsMenu.classList.remove("show");
});

const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if (isMobileDevice) {
  btnMobileFullscreen.style.display = "block";
}

btnMobileFullscreen.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    tvScreen.requestFullscreen().catch(err => console.error(err.message));
  } else {
    document.exitFullscreen();
  }
  settingsMenu.classList.remove("show"); 
});

document.addEventListener("fullscreenchange", () => {
  btnMobileFullscreen.innerText = document.fullscreenElement ? "W ramce" : "Pełny ekran";
});

btnFullscreen.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const elementToFullscreen = isMobile ? document.documentElement : tvScreen;
    elementToFullscreen.requestFullscreen().catch(err => console.error(err.message));
  } else {
    document.exitFullscreen();
  }
});

// --- NOWY SILNIK ODTWARZANIA ---

function getCycleDay() {
  const now = new Date();
  const localEpochMs = now.getTime() - (now.getTimezoneOffset() * 60000);
  return (Math.floor(localEpochMs / 86400000) % 182) + 1;
}

async function loadData() {
  try {
    infoDiv.innerText = "Pobieranie bazy wideo...";
    
    // 1. Pobieranie ramówki
    const ramRes = await fetch("ramowka.json");
    ramowkaData = await ramRes.json();

    // 2. Pobieranie listy anime i budowa drzewa
    const csvRes = await fetch("anime_lista.csv");
    const text = await csvRes.text();
    const lines = text.trim().split('\n');

    let tree = { name: "root", folders: {}, files: [] };

    for(let i = 0; i < lines.length; i++) {
      const row = lines[i];
      if (!row.includes('";"')) continue;
      const cols = row.split('";"').map(s => s.replace(/^"|"$/g, ''));
      if (cols.length < 4) continue;
      
      const fullPath = cols[0];
      const fileName = cols[1];
      const ext = cols[2];
      const durationStr = cols[3];
      
      let durParts = durationStr.split(':').map(Number);
      let durSec = 0;
      if (durParts.length === 3) durSec = durParts[0] * 3600 + durParts[1] * 60 + durParts[2];
      else if (durParts.length === 2) durSec = durParts[0] * 60 + durParts[1];

      let pathStr = fullPath.replace(/^C:\\videos\\/i, '');
      let parts = pathStr.split('\\');
      
      let current = tree;
      parts.forEach(part => {
          if (!current.folders[part]) {
              current.folders[part] = { name: part, folders: {}, files: [] };
          }
          current = current.folders[part];
      });
      current.files.push({
          fileName: fileName + ext,
          duration: durSec,
          folderPath: pathStr.replace(/\\/g, '/')
      });
    }

    // 3. Automatyczne nadawanie hierarchicznych numerów (np. 1.1, 2.1.3)
    function assignIds(node, prefix) {
        node.files.sort((a, b) => a.fileName.localeCompare(b.fileName));
        node.files.forEach((f, i) => {
            let fileId = prefix ? `${prefix}.${i + 1}` : `${i + 1}`;
            
            const encodedFolder = f.folderPath.split('/').map(encodeURIComponent).join('/');
            idMap[fileId] = {
                url: `https://aelwyd.space/${encodedFolder}/${encodeURIComponent(f.fileName)}`,
                duration: f.duration,
                folderName: node.name,
                episodeIndex: i + 1
            };
        });

        let folderNames = Object.keys(node.folders).sort((a, b) => a.localeCompare(b));
        folderNames.forEach((fName, i) => {
            let folderId = prefix ? `${prefix}.${i + 1}` : `${i + 1}`;
            assignIds(node.folders[fName], folderId);
        });
    }

    let rootFolders = Object.keys(tree.folders).sort((a, b) => a.localeCompare(b));
    rootFolders.forEach((fName, i) => {
        assignIds(tree.folders[fName], `${i + 1}`);
    });

    infoDiv.innerText = "Synchronizacja...";
    updatePlayback();
    setInterval(updatePlayback, 5000); 

  } catch (error) {
    console.error("Błąd ładowania danych: ", error);
    infoDiv.innerText = "Błąd pobierania bazy wideo 💀";
  }
}

function updatePlayback() {
  const cycleDay = getCycleDay();
  
  if (!ramowkaData || ramowkaData.length === 0) return playAmbient();

  const dayIndex = (cycleDay - 1) % ramowkaData.length;
  const todaySchedule = ramowkaData[dayIndex];

  if (!todaySchedule || todaySchedule.length === 0) return playAmbient();

  const now = new Date();
  const startOfDay = new Date(now);
  startOfDay.setHours(0, 0, 0, 0); 
  const elapsedSec = Math.floor((now.getTime() - startOfDay.getTime()) / 1000);

  let totalPlaylistSec = 0;
  const playlist = [];
  for (let id of todaySchedule) {
      if (idMap[id]) {
          playlist.push({ id, ...idMap[id] });
          totalPlaylistSec += idMap[id].duration;
      }
  }

  if (playlist.length === 0) return playAmbient();

  const currentCycleSec = elapsedSec % totalPlaylistSec;
  
  let accumulated = 0;
  let currentVideo = null;
  let currentOffset = 0;

  for (let i = 0; i < playlist.length; i++) {
      let ep = playlist[i];
      if (accumulated + ep.duration > currentCycleSec) {
          currentVideo = ep;
          currentOffset = currentCycleSec - accumulated;
          break;
      }
      accumulated += ep.duration;
  }

  if (currentVideo) {
      playVideo(currentVideo, currentOffset, cycleDay);
  } else {
      playAmbient();
  }
}

function playVideo(ep, offsetSec, cycleDay) {
    if (video.dataset.currentId !== ep.id) {
        video.dataset.currentId = ep.id;
        video.src = ep.url;
        currentIsAmbient = false;
        video.loop = false;
        video.load();

        video.onloadedmetadata = () => {
            video.currentTime = offsetSec;
            video.play().catch(() => {});
        };

        video.onended = () => updatePlayback();
    } else {
        if (!video.paused && Math.abs(video.currentTime - offsetSec) > 5) {
            video.currentTime = offsetSec;
        }
    }

    infoDiv.innerText = `▶ Dzień ${cycleDay}/182 | ${ep.folderName} odc. ${ep.episodeIndex}`;
}

function playAmbient() {
    if (video.dataset.currentId !== "ambient") {
        video.src = ambientFile;
        video.dataset.currentId = "ambient";
        currentIsAmbient = true;
        video.loop = true;
        video.play().catch(() => {});
        infoDiv.innerText = "▶ Przerwa techniczna";
    }
}

loadData();
</script>
</body>
</html>
