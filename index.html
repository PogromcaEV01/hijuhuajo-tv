<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Heisenberg TV 😏</title>

  <style>
    body {
      margin: 0;
      /* Ciemne, promieniste tło, które nie męczy wzroku */
      background: radial-gradient(circle at center, #2a2a2a 0%, #000000 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Zewnętrzna obudowa ekranu (efekt telewizora/ramki) */
    .tv-container {
      background: #111;
      padding: 16px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 0 2px #333;
    }

    /* Wewnętrzny ekran ograniczający wideo */
    .tv-screen {
      position: relative;
      width: 70vw; /* 80% szerokości okna */
      max-width: 1225px; /* Maksymalna szerokość, żeby nie było za wielkie na dużych monitorach */
      aspect-ratio: 16 / 9; /* Wymuszenie proporcji całego telewizora */
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,1);
    }

    video {
      width: 100%;
      height: 100%;
      /* ZMIANA: contain sprawia, że wideo dopasowuje się zachowując proporcje (np. 4:3 dostanie czarne pasy) */
      object-fit: contain; 
      display: block;
    }

    /* Ukrycie natywnego przycisku Play/Pause w przeglądarkach WebKit/Blink */
    video::-webkit-media-controls-play-button {
      display: none !important;
    }

    /* Zablokowanie klikania w pasek postępu (timeline) */
    video::-webkit-media-controls-timeline {
      pointer-events: none !important;
    }

    #info {
      position: absolute;
      top: 15px; 
      left: 15px;
      color: white;
      font-size: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      padding: 8px 12px;
      border-radius: 6px;
      backdrop-filter: blur(4px); /* Lekkie rozmycie pod spodem dla nowoczesnego wyglądu */
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>

<div class="tv-container">
  <div class="tv-screen">
    <!-- controlsList blokuje pobieranie i zmianę prędkości odtwarzania -->
    <video id="player" autoplay muted controls controlsList="nodownload noplaybackrate"></video>
    <div id="info">Inicjalizacja systemu...</div>
  </div>
</div>

<script>
let scheduleConfig = [];
let videosDB = {}; 
const ambientFile = "https://aelwyd.space/ambient.mp4";
let currentIsAmbient = false;

const videoPlayerElement = document.getElementById("player");
videoPlayerElement.addEventListener("pause", () => {
    videoPlayerElement.play().catch(() => {});
});

// Zwraca dzień całego cyklu: 1 do 182
function getCycleDay() {
  const now = new Date();
  const localEpochMs = now.getTime() - (now.getTimezoneOffset() * 60000);
  return (Math.floor(localEpochMs / 86400000) % 182) + 1;
}

async function loadCSV() {
  const res = await fetch("ramowka.csv");
  const text = await res.text();
  const lines = text.trim().split('\n');
  const db = {};

  for(let i = 1; i < lines.length; i++) {
    const row = lines[i];
    const cols = row.split('";"').map(s => s.replace(/^"|"$/g, ''));
    if (cols.length < 3) continue;

    const fullPath = cols[0];
    const fileName = cols[1];
    const ext = cols[2];

    const pathParts = fullPath.split('\\');
    const folderName = pathParts[pathParts.length - 1];

    if (!db[folderName]) db[folderName] = [];
    db[folderName].push(fileName + ext);
  }

  for (const folder in db) {
    db[folder].sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
  }
  return db;
}

async function startTV() {
  try {
    const res = await fetch("schedule.json");
    scheduleConfig = await res.json();
    document.getElementById("info").innerText = "Pobieranie bazy wideo...";
    videosDB = await loadCSV();
  } catch (e) {
    document.getElementById("info").innerText = "BŁĄD ŁADOWANIA DANYCH 💀";
    console.error(e);
    return;
  }
  sync();
  setInterval(sync, 5000);
}

function playAmbient() {
  const video = document.getElementById("player");
  if (currentIsAmbient) return;
  
  currentIsAmbient = true;
  video.src = ambientFile;
  video.loop = true;
  video.load();
  
  video.onloadedmetadata = () => {
    const now = new Date();
    const offsetSec = (now.getMinutes() % 30) * 60 + now.getSeconds();
    const epDur = parseFloat(video.dataset.epDuration || 1380); 
    video.currentTime = Math.max(0, offsetSec - epDur) % (video.duration || 1);
    video.play().catch(() => {});
  };
}

function sync() {
  const now = new Date();
  const cycleDay = getCycleDay();
  
  // Obliczenie aktualnego dnia tygodnia na podstawie cycleDay (1=Poniedziałek, 7=Niedziela)
  // Zakładamy, że cykl zaczął się w poniedziałek
  const currentDOW = ((cycleDay - 1) % 7) + 1; 
  
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const isSecondHalf = m >= 30;

  // Szukanie konfiguracji dla obecnej godziny
  const hourConfigs = scheduleConfig.filter(x => x.hour === h);
  
  // Szukamy takiej, która pasuje do dzisiejszego dnia tygodnia, albo takiej, która leci codziennie (brak 'days')
  let hourConfig = hourConfigs.find(x => !x.days || x.days.includes(currentDOW));
  
  // Zabezpieczenie: jeśli ktoś zepsuł JSON i nie ma nic na ten dzień, weź pierwszą z brzegu z tej godziny
  if (!hourConfig) hourConfig = hourConfigs[0] || scheduleConfig[0];

  const seriesFolders = hourConfig.folders || [hourConfig.folder];
  let allEpisodes = [];
  
  for (const f of seriesFolders) {
    if (videosDB[f]) {
      videosDB[f].forEach(fileName => {
        allEpisodes.push({ folder: f, file: fileName });
      });
    }
  }

  if (allEpisodes.length === 0) {
    document.getElementById("info").innerText = `BRAK FILMÓW W FOLDERACH: ${seriesFolders.join(', ')} 💀`;
    return;
  }

  // LOGIKA WYLICZANIA ODCINKÓW - Liczy tylko te dni, w które dany blok faktycznie był emitowany
  let baseIndex = 0;
  
  if (hourConfig.days && hourConfig.days.length > 0) {
    const fullWeeks = Math.floor((cycleDay - 1) / 7);
    const occurrencesInFullWeeks = fullWeeks * hourConfig.days.length;
    
    let occurrencesThisWeek = 0;
    for(let d of hourConfig.days) {
        if (d <= currentDOW) occurrencesThisWeek++;
    }
    
    // Zapobiega ujemnemu indeksowi w przypadku błędów
    baseIndex = Math.max(0, occurrencesInFullWeeks + occurrencesThisWeek - 1);
  } else {
    baseIndex = cycleDay - 1; // Codziennie
  }

  let targetIndex = baseIndex; 
  if (isSecondHalf) {
    targetIndex += 1; // Przeskok na nową część
  }

  const safeIndex = targetIndex % allEpisodes.length;
  const currentEpisode = allEpisodes[safeIndex];

  const currentFolder = currentEpisode.folder;
  const currentFileName = currentEpisode.file;

  const videoUrl = `https://aelwyd.space/${encodeURIComponent(currentFolder)}/${encodeURIComponent(currentFileName)}`;
  const slotId = `${currentFolder}-${currentFileName}-${isSecondHalf ? 'new' : 'old'}`;
  const video = document.getElementById("player");
  const offsetSec = (m % 30) * 60 + s;

  if (video.dataset.slotId !== slotId) {
    video.dataset.slotId = slotId;
    video.src = videoUrl;
    currentIsAmbient = false;
    video.load();

    video.onloadedmetadata = () => {
      video.dataset.epDuration = video.duration;
      if (offsetSec >= video.duration) {
        playAmbient();
      } else {
        video.currentTime = offsetSec;
        video.play().catch(() => {});
      }
    };

    video.onended = () => {
      if (!currentIsAmbient) playAmbient();
    };
  } else {
    if (!currentIsAmbient && video.readyState >= 1) {
      if (offsetSec >= parseFloat(video.dataset.epDuration || 99999)) {
        playAmbient();
      }
    }
  }

  const formatTime = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
  const typeLabel = currentIsAmbient ? '🌿 AMBIENT' : '📺 TRWA';
  const episodeInfo = isSecondHalf ? 'Premiera' : 'Powtórka';

  const episodeIndexInCurrentSeries = videosDB[currentFolder].indexOf(currentFileName) + 1;

  document.getElementById("info").innerText =
    `▶ Dzień ${cycleDay}/182 | ${formatTime} | ${hourConfig.title} | ${currentFolder} Odc. ${episodeIndexInCurrentSeries} (${episodeInfo}) | ${typeLabel}`;
}

startTV();
</script>
</body>
</html>
