<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Heisenberg TV 😏</title>
</head>
<body style="margin:0; background:black; overflow:hidden;">

<video id="player" autoplay muted controls style="width:100%; height:100vh;"></video>

<script>
async function startTV() {
  const res = await fetch("schedule.json");
  const schedule = await res.json();

  const now = new Date();

  const currentSeconds =
    now.getHours() * 3600 +
    now.getMinutes() * 60 +
    now.getSeconds();

  function timeToSeconds(t) {
    const [h, m] = t.split(":").map(Number);
    return (h * 3600) + (m * 60);
  }

  let currentSlot = schedule[0];

  for (let i = 0; i < schedule.length; i++) {
    if (timeToSeconds(schedule[i].time) <= currentSeconds) {
      currentSlot = schedule[i];
    }
  }

  const title = document.createElement("div");
title.style.position = "absolute";
title.style.bottom = "20px";
title.style.left = "20px";
title.style.color = "white";
title.style.fontSize = "20px";
title.innerText = currentSlot.file;
document.body.appendChild(title);

  const slotStart = timeToSeconds(currentSlot.time);
  let offset = currentSeconds - slotStart;

  const video = document.getElementById("player");
  video.src = "videos/" + currentSlot.file;

  video.addEventListener("loadedmetadata", () => {
    if (offset > video.duration) {
      offset = offset % video.duration;
    }
    video.currentTime = offset;
  });

  video.addEventListener("canplay", () => {
    video.play();
  });

  // 🔁 auto przełączanie na kolejny slot
  setInterval(() => {
    location.reload();
  }, 30000); // co 30 sekund sprawdza czy zmienił się slot
}

  

startTV();
</script>

</body>
</html>
