<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ramówka emisji</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #bb86fc;
            --accent-hover: #9c4dff;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .schedule-container {
            max-width: 800px;
            width: 100%;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: var(--card-bg);
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid rgba(187, 134, 252, 0.3);
            transition: all 0.2s ease-in-out;
        }

        .back-btn:hover {
            background-color: var(--accent);
            color: #121212;
            transform: scale(1.05);
        }
        
        h1 {
            text-align: center;
            color: var(--accent);
            margin-top: 60px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .controls label {
            font-weight: bold;
            margin-right: 10px;
            color: var(--accent);
        }

        .controls input[type="date"] {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .controls input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(1) hue-rotate(200deg) saturate(5);
            cursor: pointer;
        }
        
        .schedule-item {
            background-color: var(--card-bg);
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease-in-out;
        }
        
        .schedule-item:hover {
            transform: translateX(5px);
            border-left: 4px solid var(--accent);
        }
        
        .time-block {
            background-color: var(--accent);
            color: #121212;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 20px;
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .content-block {
            padding: 15px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        
        .folders {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ep-info {
            background-color: #252525;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #444;
            word-break: break-all; 
        }
        
        .folder-tag {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
        }

        .ep-name {
            color: #cfcfcf;
            font-size: 0.95rem;
            display: block;
            margin-left: 10px;
            margin-bottom: 4px;
        }

        .ep-name::before {
            content: "▶ ";
            color: var(--accent);
            font-size: 0.8rem;
        }

        .loading-info {
            text-align: center;
            color: var(--accent);
            font-size: 1.2rem;
            margin-top: 40px;
        }

        @media (max-width: 500px) {
            .back-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
            h1 {
                margin-top: 50px;
                font-size: 1.5rem;
            }
            .time-block {
                min-width: 60px;
                font-size: 1.2rem;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        wróć do tv
    </a>

<div class="schedule-container">
    <h1>📺 ramówka transmisji</h1>
    
    <div class="controls">
        <label for="schedule-date">Wybierz dzień emisji:</label>
        <input type="date" id="schedule-date" min="2026-05-01">
    </div>

    <div id="schedule-list">
        <div class="loading-info">Pobieranie bazy danych...</div>
    </div>
</div>

<script>
    // Globalne zmienne dla bazy odcinków i ramówki
    let episodesDB = {};
    let scheduleData = [];

    const scheduleList = document.getElementById('schedule-list');
    const dateInput = document.getElementById('schedule-date');
    
    // Ustawienie domyślnej daty na 'dzisiaj' w bezpiecznym formacie (YYYY-MM-DD)
    const today = new Date();
    const localIsoDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
    dateInput.value = localIsoDate;

    function formatTime(hour) {
        return `${hour.toString().padStart(2, '0')}:00`;
    }

    async function loadData() {
        try {
            // 1. Pobieranie pliku ramowka.json
            const resJson = await fetch("ramowka.json");
            scheduleData = await resJson.json();

            // 2. Pobieranie i parsowanie pliku anime_lista.csv w taki sam sposób jak w index.html
            const resCsv = await fetch("anime_lista.csv");
            const csvText = await resCsv.text();
            const lines = csvText.trim().split('\n');
            
            for(let i = 0; i < lines.length; i++) {
                const row = lines[i];
                if (!row.includes('";"')) continue;
                const cols = row.split('";"').map(s => s.replace(/^"|"$/g, ''));
                if (cols.length < 4) continue;

                const fullPath = cols[0];
                const fileName = cols[1];
                const ext = cols[2];

                // Wyciąganie nazwy ostatniego folderu
                const pathParts = fullPath.replace(/\\/g, '/').split('/');
                const folderName = pathParts[pathParts.length - 1]; 

                if (!episodesDB[folderName]) {
                    episodesDB[folderName] = [];
                }
                
                // Do ramówki potrzebujemy jedynie pełnej nazwy pliku
                episodesDB[folderName].push(fileName + ext);
            }

            // Po załadowaniu danych generujemy ramówkę dla wybranej daty
            renderSchedule(dateInput.value);

        } catch (error) {
            console.error("Błąd podczas wczytywania danych:", error);
            scheduleList.innerHTML = `<div class="loading-info" style="color: red;">Nie udało się załadować danych ramówki lub bazy odcinków.</div>`;
        }
    }

    function renderSchedule(targetDateString) {
        if (!scheduleData.length || Object.keys(episodesDB).length === 0) return; // Zapobiega renderowaniu bez danych

        scheduleList.innerHTML = '';
        
        // Bezpieczne parsowanie daty z kalendarza, odporne na przesunięcia czasowe
        const [year, month, day] = targetDateString.split('-');
        const targetDate = new Date(year, month - 1, day);
        targetDate.setHours(0,0,0,0);
        
        // Obliczanie cyklu i wewnętrznego DOW na podstawie czasu Epoch
        const localEpochMs = targetDate.getTime() - (targetDate.getTimezoneOffset() * 60000);
        const cycleDay = (Math.floor(localEpochMs / 86400000) % 182) + 1;
        const currentDOW = ((cycleDay - 1) % 7) + 1; 
        
        const runsOnDOW = (cfg, dow) => !cfg.days || cfg.days.includes(dow);
        
        scheduleData.forEach(item => {
            if (!runsOnDOW(item, currentDOW)) return; 
            
            const seriesFolders = item.folders || [item.folder];
            const programKey = seriesFolders.join('|');
            
            let allEpisodes = [];
            for (const f of seriesFolders) {
                if (episodesDB[f]) {
                    episodesDB[f].forEach(fileName => {
                        allEpisodes.push({ folder: f, file: fileName });
                    });
                }
            }
            
            if (allEpisodes.length === 0) return;

            const programConfigs = scheduleData.filter(cfg => {
                const f = cfg.folders || [cfg.folder];
                return f.join('|') === programKey;
            });
            
            let totalPastEpisodes = 0;
            for (let d = 1; d < cycleDay; d++) {
                const dow = ((d - 1) % 7) + 1;
                for (const cfg of programConfigs) {
                    if (runsOnDOW(cfg, dow)) {
                        totalPastEpisodes++;
                    }
                }
            }
            
            const todaysConfigs = programConfigs.filter(cfg => runsOnDOW(cfg, currentDOW)).sort((a,b) => a.hour - b.hour);
            const H = todaysConfigs.length;
            const i = todaysConfigs.findIndex(cfg => cfg.hour === item.hour);
            
            const slotIndex0 = i * 2 + 0;
            const targetIndex0 = totalPastEpisodes - H + slotIndex0;
            const safeIndex0 = ((targetIndex0 % allEpisodes.length) + allEpisodes.length) % allEpisodes.length;
            const ep0 = allEpisodes[safeIndex0];
            
            const slotIndex1 = i * 2 + 1;
            const targetIndex1 = totalPastEpisodes - H + slotIndex1;
            const safeIndex1 = ((targetIndex1 % allEpisodes.length) + allEpisodes.length) % allEpisodes.length;
            const ep1 = allEpisodes[safeIndex1];
            
            const el = document.createElement('div');
            el.className = 'schedule-item';
            
            const timeHTML = `<div class="time-block">${formatTime(item.hour)}</div>`;
            
            let playingHTML = '';
            
            if (ep0 && ep1 && ep0.folder === ep1.folder) {
                playingHTML += `
                    <div class="ep-info">
                        <span class="folder-tag">${ep0.folder}</span>
                        <span class="ep-name">${ep0.file}</span>
                        <span class="ep-name">${ep1.file}</span>
                    </div>`;
            } else {
                if (ep0) {
                    playingHTML += `
                        <div class="ep-info">
                            <span class="folder-tag">${ep0.folder}</span>
                            <span class="ep-name">${ep0.file}</span>
                        </div>`;
                }
                if (ep1) {
                    playingHTML += `
                        <div class="ep-info">
                            <span class="folder-tag">${ep1.folder}</span>
                            <span class="ep-name">${ep1.file}</span>
                        </div>`;
                }
            }
            
            const contentHTML = `
                <div class="content-block">
                    <h3 class="title">${item.title}</h3>
                    <div class="folders">${playingHTML}</div>
                </div>
            `;
            
            el.innerHTML = timeHTML + contentHTML;
            scheduleList.appendChild(el);
        });

        const infoDiv = document.createElement('div');
        infoDiv.style.textAlign = 'center';
        infoDiv.style.color = '#555';
        infoDiv.style.marginTop = '25px';
        infoDiv.style.fontSize = '0.85rem';
        infoDiv.innerText = `Symulacja wewnętrzna TV - dzień cyklu: ${cycleDay}/182 | DOW: ${currentDOW}`;
        scheduleList.appendChild(infoDiv);
    }

    // Nasłuchiwanie zmian w kalendarzu
    dateInput.addEventListener('change', (e) => {
        renderSchedule(e.target.value);
    });
    
    // Uruchamiamy pobieranie danych i renderowanie po uruchomieniu skryptu
    loadData();
</script>
</body>
</html>
