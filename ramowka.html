<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ramówka emisji</title>
    <link id="favicon" rel="icon" type="image/png" href="1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #bb86fc;
            --accent-hover: #9c4dff;
        }
        
        /* Tło przeniesione do html, żeby poprawnie współpracowało z z-index */
        html {
            background-color: var(--bg-color);
        }

        body {
            font-family: 'Shadows Into Light', cursive;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            font-size: 18px;
            /* Usunięto perspective stąd, bo psuło fixed na długich stronach */
        }
        
        .schedule-container {
            max-width: 800px;
            width: 100%;
            position: relative; /* Upewnia się, że treść jest nad tłem */
            z-index: 10;
        }

        /* --- NOWY WRAPPER NA EFEKTY TŁA Z VNRIKE --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            perspective: 1000px; /* Głębia 3D jest teraz tutaj */
            z-index: -1;
            pointer-events: none;
            overflow: hidden; /* Blokuje wychodzenie siatki poza ekran */
        }

        .spotlight-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, #000000 95%);
            box-shadow: inset 0 0 150px rgba(145, 70, 255, 0.2);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1;
        }

        .cyber-grid {
            position: absolute;
            bottom: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(145, 70, 255, 0.8) 2px, transparent 2px),
                linear-gradient(90deg, rgba(145, 70, 255, 0.8) 2px, transparent 2px);
            background-size: 50px 50px;
            transform: rotateX(75deg) translateY(50px) scale(1.2);
            animation: gridWarpSpeed 0.4s linear infinite;
            filter: drop-shadow(0 0 10px #9146ff);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 0;
        }

        /* REAKCJA: Kliknięcie przycisku (Płynny, kinowy Warp drive) */
        body.btn-clicked .spotlight-overlay {
            background: radial-gradient(circle at center, rgba(255, 70, 197, 0.15) 0%, #000000 90%);
            box-shadow: inset 0 0 250px rgba(255, 70, 197, 0.4);
            transition: all 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.btn-clicked .cyber-grid {
            filter: drop-shadow(0 0 50px #ff46c5) hue-rotate(90deg) brightness(1.3);
            transform: rotateX(82deg) translateY(150px) scale(2.2);
            transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1), filter 3s ease-out;
            animation: gridWarpSpeed 0.15s linear infinite; 
        }

        @keyframes gridWarpSpeed {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* --- GOD-TIER BUTTON (Back-Btn) --- */
        .button-wrapper {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transform-origin: top left;
            transform: scale(0.65);
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            box-shadow: 0 0 0 0 rgba(145, 70, 255, 0.7);
            animation: pulsing 3s infinite cubic-bezier(0.66, 0, 0, 1);
            z-index: 0;
            pointer-events: none;
        }

        .pulse-ring.delay { animation-delay: 1.5s; }

        .epic-twitch-btn {
            position: relative;
            padding: 3px;
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(145, 70, 255, 0.3);
            cursor: pointer;
            user-select: none;
            /* USUNIĘTO: font-family: 'Inter', 'Segoe UI', sans-serif; */
        }

        .epic-twitch-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%; width: 150%; height: 300%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 60%, #ff46c5 80%, #ffffff 100%);
            transform: translate(-50%, -50%);
            animation: spin 2.5s linear infinite;
            z-index: -2;
        }

        .btn-content {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 30px;
            background: linear-gradient(145deg, #18181b, #2a114f);
            border-radius: 21px;
            z-index: -1;
            box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .btn-content::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(145, 70, 255, 0.8) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .progress-overlay {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, rgba(145, 70, 255, 0.6), rgba(255, 70, 197, 0.8));
            z-index: 1;
            transition: width 0.3s ease-out;
        }

        body.btn-clicked .progress-overlay {
            width: 100%;
            transition: width 3s linear;
        }

        .epic-twitch-btn svg {
            position: relative;
            width: 28px;
            height: 28px;
            stroke: #ffffff;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        .epic-twitch-btn .text {
            position: relative;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: transparent;
            z-index: 2;
            background: linear-gradient(90deg, #ffffff 0%, #b785ff 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            transition: all 0.3s ease;
        }

        .sparks {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
        }
        
        .sparks::before, .sparks::after {
            content: ''; position: absolute; width: 4px; height: 4px;
            background: #fff; border-radius: 50%; opacity: 0;
            box-shadow: 0 0 8px 2px #ff46c5; transition: opacity 0.3s;
        }

        .epic-twitch-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 15px 50px rgba(145, 70, 255, 0.8);
        }

        .epic-twitch-btn:hover .btn-content::before { opacity: 1; }
        .epic-twitch-btn:hover .text { animation: textShimmer 2s linear infinite; filter: drop-shadow(0 0 8px rgba(183, 133, 255, 0.8)); }
        .epic-twitch-btn:hover svg { transform: scale(1.2) translateX(-5px); stroke: #b785ff; }
        .epic-twitch-btn:hover .sparks::before { animation: flyUpLeft 1s ease-out infinite; }
        .epic-twitch-btn:hover .sparks::after { animation: flyUpRight 1.2s ease-out infinite 0.3s; }
        .epic-twitch-btn:active { transform: translateY(2px) scale(0.95); }

        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes pulsing { 0% { box-shadow: 0 0 0 0 rgba(145, 70, 255, 0.6); } 70% { box-shadow: 0 0 0 30px rgba(145, 70, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(145, 70, 255, 0); } }
        @keyframes textShimmer { to { background-position: 200% center; } }
        @keyframes flyUpLeft { 0% { transform: translate(20px, 40px) scale(1); opacity: 1; } 100% { transform: translate(-30px, -40px) scale(0); opacity: 0; } }
        @keyframes flyUpRight { 0% { transform: translate(180px, 40px) scale(1); opacity: 1; } 100% { transform: translate(230px, -30px) scale(0); opacity: 0; } }

        /* --- POZOSTAŁE STYLE RAMÓWKI --- */
        h1 {
            text-align: center;
            color: var(--accent);
            margin-top: 80px; 
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .controls label {
            font-weight: bold;
            margin-right: 10px;
            color: var(--accent);
        }

        .controls input[type="date"] {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .controls input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(1) hue-rotate(200deg) saturate(5);
            cursor: pointer;
        }

        #loading-screen {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--accent);
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        
        .schedule-item {
            background-color: var(--card-bg);
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease-in-out;
            position: relative; 
            z-index: 10;
        }
        
        .schedule-item:hover {
            transform: translateX(5px);
            border-left: 4px solid var(--accent);
        }
        
        .time-block {
            background-color: var(--accent);
            color: #121212;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 20px;
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .content-block {
            padding: 15px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        
        .folders {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ep-info {
            background-color: #252525;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #444;
            word-break: break-all; 
        }
        
        .folder-tag {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .ep-name {
            color: #cfcfcf;
            font-size: 0.95rem;
            display: block;
            margin-left: 10px;
            margin-bottom: 4px;
        }

        .ep-name::before {
            content: "▶ ";
            color: var(--accent);
            font-size: 0.8rem;
        }

        @media (max-width: 500px) {
            .button-wrapper {
                transform: scale(0.5); 
                top: 10px; left: 10px;
            }
            h1 {
                margin-top: 60px;
                font-size: 1.5rem;
            }
            .time-block {
                min-width: 60px;
                font-size: 1.2rem;
                padding: 15px;
            }
        }
        /* --- REAKCJA: 50% załadowania (1.5 sekundy) - GOD TIER SMOOTH --- */

/* Płynne przejście tła w "rdzeń warp" - oślepiające, czyste światło */
body.btn-halfway .spotlight-overlay {

    /* Czas przejścia to dokładnie 1.5s - idealnie zgra się z końcem paska */

}

/* Siatka warp zagina się ekstremalnie i przyspiesza, ale nieskazitelnie płynnie */
body.btn-halfway .cyber-grid {

}

/* Interfejs "wgniata się w fotel" (G-Force) i dostaje świetlistej aury */
body.btn-halfway .schedule-container {

}

/* Pasek ładowania zapala się na biało na samej końcówce */
body.btn-halfway .progress-overlay {
    background: linear-gradient(90deg, rgba(145, 70, 255, 0.8), #ffffff);

}

/* Przycisk zaczyna lewitować i promieniować czystą energią */
body.btn-halfway .epic-twitch-btn {

    transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
}

body.btn-halfway .epic-twitch-btn .text {
    color: #ffffff;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
    transition: all 1.5s ease-out;
}

/* Super szybka, ale jedwabista animacja siatki */
@keyframes godTierWarp {
    0% { background-position: 0 0; }
    /* Zwiększony dystans przesuwania (100px) daje iluzję potężnej prędkości bez utraty płynności */
    100% { background-position: 0 100px; } 
}
    </style>
</head>

<script>
// Generujemy ścieżki uwzględniając folder 'vm/'
const frames = Array.from({ length: 34 }, (_, index) => `f4gW/${index + 1}.png`);

let i = 0;
const favicon = document.getElementById("favicon");

setInterval(() => {
  favicon.href = frames[i];
  i = (i + 1) % frames.length;
}, 300);
    // --- OBSŁUGA GOD-TIER BUTTONA ---
    const btn = document.getElementById('godTierBtn');
    const bdy = document.body;
    const warpSound = document.getElementById('warpSound'); // Pobieramy audio
    let holdTimer; 
    let halfwayTimer; 

    // Opcjonalnie: możesz ściszyć dźwięk, jeśli jest za głośny (0.0 do 1.0)
    warpSound.volume = 0.8; 

    // Funkcja resetująca wszystkie timery, klasy i DŹWIĘK
    function clearTimers() {
        clearTimeout(holdTimer);
        clearTimeout(halfwayTimer);
        bdy.classList.remove('btn-clicked', 'btn-halfway');
        
        // Zatrzymujemy audio i cofamy do początku
        warpSound.pause();
        warpSound.currentTime = 0;
    }

    // Myszka / Desktop
    btn.addEventListener('mouseenter', () => { bdy.classList.add('btn-hovered'); });
    btn.addEventListener('mouseleave', () => {
        bdy.classList.remove('btn-hovered');
        clearTimers(); 
    });
    
    btn.addEventListener('mousedown', () => {
        bdy.classList.add('btn-clicked');
        
        // Startujemy dźwięk!
        warpSound.play().catch(e => console.log("Przeglądarka zablokowała audio:", e));
        
        halfwayTimer = setTimeout(() => { 
            bdy.classList.add('btn-halfway'); 
        }, 1500);

        holdTimer = setTimeout(() => { 
            window.location.href = 'index.html'; 
        }, 3000);
    });
    
    btn.addEventListener('mouseup', () => {
        clearTimers(); 
    });

    // Dotyk / Mobile
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        bdy.classList.add('btn-hovered', 'btn-clicked');
        
        // Startujemy dźwięk na telefonie!
        warpSound.play().catch(e => console.log("Przeglądarka zablokowała audio:", e));
        
        halfwayTimer = setTimeout(() => { 
            bdy.classList.add('btn-halfway'); 
        }, 1500);

        holdTimer = setTimeout(() => { 
            window.location.href = 'index.html'; 
        }, 3000);
    }, {passive: false});
    
    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        bdy.classList.remove('btn-hovered');
        clearTimers();
    }, {passive: false});


    // --- GŁÓWNA LOGIKA RAMÓWKI ---
    let scheduleConfig = [];
    let videosDB = {};

    const scheduleList = document.getElementById('schedule-list');
    const dateInput = document.getElementById('schedule-date');
    const loadingScreen = document.getElementById('loading-screen');

    async function loadCSV() {
        const res = await fetch("anime_lista.csv");
        const text = await res.text();
        const lines = text.trim().split('\n');
        const db = {};

        for(let i = 0; i < lines.length; i++) {
            const row = lines[i];
            if (!row.includes('";"')) continue;
            const cols = row.split('";"').map(s => s.replace(/^"|"$/g, ''));
            if (cols.length < 4) continue;

            const fullPath = cols[0];
            const fileName = cols[1];
            const ext = cols[2];
            const durationStr = cols[3]; 

            let durParts = durationStr.split(':').map(Number);
            let durSec = 0;
            if (durParts.length === 3) {
                durSec = durParts[0] * 3600 + durParts[1] * 60 + durParts[2];
            } else if (durParts.length === 2) {
                durSec = durParts[0] * 60 + durParts[1];
            }

            const folderName = fullPath.replace(/^C:\\videos\\/i, '').replace(/\\/g, '/');

            if (!db[folderName]) db[folderName] = [];
            db[folderName].push({
                file: fileName + ext,
                durationSec: durSec || 1440 
            });
        }
        return db;
    }

    function getBlockEnd(startTimeSec, durationSec) {
        const endTimeSec = startTimeSec + durationSec;
        const startHour = Math.floor(startTimeSec / 3600);
        const endHour = Math.floor((endTimeSec - 1) / 3600); 

        if (endHour > startHour) {
            return (endHour + 1) * 3600;
        } else {
            const halfHourSec = startHour * 3600 + 1800;
            if (startTimeSec < halfHourSec && endTimeSec <= halfHourSec) {
                return halfHourSec;
            } else {
                return (startHour + 1) * 3600;
            }
        }
    }

    // --- NOWA FUNKCJA POMOCNICZA ---
    function formatExactTime(sec) {
        let h = Math.floor(sec / 3600) % 24;
        let m = Math.floor((sec % 3600) / 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    // --- PRZEBUDOWANY SYMULATOR ---
    function simulateFullDay(targetCycleDay) {
        let t = 0; 
        let series_state = {};
        for(let f in videosDB) {
            series_state[f] = { next_ep_idx: 0, finished: false };
        }

        const max_t = targetCycleDay * 86400; 
        const start_t_day = (targetCycleDay - 1) * 86400;
        let events = []; // Zbieramy wszystkie wydarzenia do płaskiej listy

        while (t < max_t) {
            let day = Math.floor(t / 86400) + 1;
            let hour = Math.floor((t % 86400) / 3600);
            let dow = ((day - 1) % 7) + 1;

            let configConfigs = scheduleConfig.filter(x => x.hour === hour);
            let config = configConfigs.find(x => !x.days || x.days.includes(dow)) || configConfigs[0];

            if (!config) {
                t = Math.floor(t / 3600) * 3600 + 3600;
                continue;
            }

            let folders = config.folders || [config.folder];
            let valid_folders = folders.filter(f => videosDB[f] && videosDB[f].length > 0);

            if (valid_folders.length === 0) {
                t = Math.floor(t / 3600) * 3600 + 3600;
                continue;
            }

            let active_folder = null;
            for (let f of valid_folders) {
                if (!series_state[f]) series_state[f] = { next_ep_idx: 0, finished: false };
                if (!series_state[f].finished) {
                    active_folder = f;
                    break;
                }
            }

            if (!active_folder) {
                for (let f of valid_folders) {
                    series_state[f].next_ep_idx = 0;
                    series_state[f].finished = false;
                }
                active_folder = valid_folders[0];
            }

            let advanced_t = t;
            let f = active_folder;
            let db = videosDB[f];
            let total_eps = db.length;
            let state = series_state[f];
            let eps_to_play = [];

            if (total_eps === 1) {
                eps_to_play.push({ type: 'premiere', idx: 0 });
                state.finished = true;
            } else {
                if (state.next_ep_idx === 0) {
                    eps_to_play.push({ type: 'premiere', idx: 0 });
                    state.next_ep_idx++;
                } else if (state.next_ep_idx < total_eps) {
                    eps_to_play.push({ type: 'rerun', idx: state.next_ep_idx - 1 });
                    eps_to_play.push({ type: 'premiere', idx: state.next_ep_idx });
                    state.next_ep_idx++;
                } else if (state.next_ep_idx === total_eps) {
                    eps_to_play.push({ type: 'rerun', idx: state.next_ep_idx - 1 });
                    state.finished = true;
                }
            }

            for (let ep of eps_to_play) {
                let ep_info = db[ep.idx];
                let duration = ep_info.durationSec;
                let ep_start_t = advanced_t;
                let ep_end_t = ep_start_t + duration;
                let block_end_t = getBlockEnd(ep_start_t, duration);

                if (ep === eps_to_play[eps_to_play.length - 1] && (state.finished || eps_to_play.length === 1)) {
                    let next_hour_t = Math.floor(t / 3600) * 3600 + 3600;
                    if (block_end_t < next_hour_t) {
                        block_end_t = next_hour_t;
                    }
                }

                // Jeśli wydarzenie pokrywa się z wybranym dniem, dodajemy je do listy
                if (ep_end_t > start_t_day && ep_start_t < max_t) {
                    events.push({
                        title: config.title || f,
                        folder: f,
                        file: ep_info.file,
                        type: ep.type,
                        idx: ep.idx,
                        start_t: ep_start_t,
                        end_t: ep_end_t,
                        durationSec: duration
                    });
                }
                
                advanced_t = block_end_t;
            }

            if (advanced_t > t) {
                t = advanced_t; 
            } else {
                t = Math.floor(t / 3600) * 3600 + 3600; 
            }
        }

        return events;
    }

    // --- PRZEBUDOWANY RENDERER (BEZ LINKÓW) ---
    function renderSchedule(targetDateString) {
        scheduleList.innerHTML = '';
        
        const [year, month, day] = targetDateString.split('-');
        const targetDate = new Date(year, month - 1, day);
        targetDate.setHours(0,0,0,0);
        
        const localEpochMs = targetDate.getTime() - (targetDate.getTimezoneOffset() * 60000);
        const cycleDay = (Math.floor(localEpochMs / 86400000) % 182) + 1;
        const currentDOW = ((cycleDay - 1) % 7) + 1; 

        const events = simulateFullDay(cycleDay);
        const dayStartSec = (cycleDay - 1) * 86400;

        // Inicjujemy zawsze 24 godziny
        let hourlyBlocks = Array.from({length: 24}, () => ({ title: "Przerwa w emisji / Oczekiwanie", episodes: [] }));

        // Rozrzucamy programy do odpowiednich godzin
        events.forEach(ep => {
            let epStartInDay = ep.start_t - dayStartSec;
            let epEndInDay = ep.end_t - dayStartSec;
            
            let startHour = Math.max(0, Math.floor(epStartInDay / 3600));
            let endHour = Math.min(23, Math.floor((epEndInDay - 1) / 3600)); 
            if (endHour < 0) endHour = 0;

            for (let h = startHour; h <= endHour; h++) {
                hourlyBlocks[h].title = ep.title;
                
                let epObj = { ...ep };
                epObj.displayTime = `${formatExactTime(ep.start_t)} - ${formatExactTime(ep.end_t)}`;
                
                // Oznaczamy, jeśli film zaczął się we wcześniejszej godzinie lub wczoraj
                if (epStartInDay < h * 3600) {
                    epObj.isContinuation = true;
                }
                
                hourlyBlocks[h].episodes.push(epObj);
            }
        });

        // Generujemy widok dla każdej z 24 godzin
        for (let hour = 0; hour < 24; hour++) {
            const block = hourlyBlocks[hour];
            const el = document.createElement('div');
            el.className = 'schedule-item';
            
            const timeHTML = `<div class="time-block">${hour.toString().padStart(2, '0')}:00</div>`;
            
            let playingHTML = '';
            let currentFolder = null;

            if (block.episodes.length === 0) {
                playingHTML = `<div class="ep-info"><span class="ep-name" style="color:#888;">Brak zaplanowanych programów</span></div>`;
            } else {
                block.episodes.forEach((ep) => {
                    if (ep.folder !== currentFolder) {
                        if (currentFolder !== null) playingHTML += `</div>`; 
                        currentFolder = ep.folder;
                        playingHTML += `
                            <div class="ep-info">
                                <span class="folder-tag">${ep.folder}</span>
                        `;
                    }
                    
                    const durationMin = Math.round(ep.durationSec / 60);
                    let contBadge = ep.isContinuation ? `<span style="color: #ff46c5; font-size: 0.75rem; border: 1px solid #ff46c5; padding: 2px 4px; border-radius: 4px; margin-right: 5px;">kontynuacja</span>` : '';

                    playingHTML += `
                        <span class="ep-name">
                            <strong style="color:var(--accent); font-size:1.05rem;">[${ep.displayTime}]</strong> ${contBadge}
                            odc. ${ep.idx + 1} - <span style="color: #cfcfcf;">${ep.file}</span>
                            <span style="color: #999; font-size: 0.85rem; font-weight: normal; margin-left: 5px;">(${durationMin} min)</span>
                        </span>
                    `;
                });
                if (currentFolder !== null) playingHTML += `</div>`;
            }
            
            const contentHTML = `
                <div class="content-block">
                    <h3 class="title">${block.title}</h3>
                    <div class="folders">${playingHTML}</div>
                </div>
            `;
            
            el.innerHTML = timeHTML + contentHTML;
            scheduleList.appendChild(el);
        }

        const infoDiv = document.createElement('div');
        infoDiv.style.textAlign = 'center';
        infoDiv.style.color = '#555';
        infoDiv.style.marginTop = '25px';
        infoDiv.style.fontSize = '0.85rem';
        infoDiv.innerText = `tv engine sim - dzień cyklu: ${cycleDay}/182 | dzień tyg. (DOW): ${currentDOW}`;
        scheduleList.appendChild(infoDiv);
    }
    async function init() {
        try {
            const resSchedule = await fetch("ramowka.json");
            scheduleConfig = await resSchedule.json();
            videosDB = await loadCSV();

            const today = new Date();
            const localIsoDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            dateInput.value = localIsoDate;
            dateInput.disabled = false;
            
            loadingScreen.style.display = 'none';

            renderSchedule(dateInput.value);

            dateInput.addEventListener('change', (e) => {
                if (e.target.value) renderSchedule(e.target.value);
            });

        } catch (e) {
            console.error(e);
            loadingScreen.innerHTML = "BŁĄD ŁADOWANIA DANYCH 💀 Upewnij się, że ramowka.json oraz anime_lista.csv są dostępne na serwerze.";
            loadingScreen.style.color = "#ff4444";
        }
    }

    init();
</script>
