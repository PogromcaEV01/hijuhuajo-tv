<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ramówka emisji</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #bb86fc;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .schedule-container {
            max-width: 800px;
            width: 100%;
        }

        /* --- ZMIENIONY STYL PRZYCISKU POWROTU --- */
        .back-btn {
            position: fixed; /* Przykleja przycisk do ekranu */
            top: 20px;       /* Odległość od góry */
            left: 20px;      /* Odległość od lewej */
            z-index: 100;    /* Gwarantuje, że przycisk będzie zawsze na wierzchu */
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: var(--card-bg);
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid rgba(187, 134, 252, 0.3);
            transition: all 0.2s ease-in-out;
        }

        .back-btn:hover {
            background-color: var(--accent);
            color: #121212;
            transform: scale(1.05); /* Delikatne powiększenie zamiast przesuwania */
        }
        
        h1 {
            text-align: center;
            color: var(--accent);
            margin-top: 60px; /* Zrobienie miejsca na górze, by przycisk nie zasłaniał tytułu na telefonach */
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .schedule-item {
            background-color: var(--card-bg);
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease-in-out;
        }
        
        .schedule-item:hover {
            transform: translateX(5px);
            border-left: 4px solid var(--accent);
        }
        
        .time-block {
            background-color: var(--accent);
            color: #121212;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 20px;
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .content-block {
            padding: 15px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 8px 0;
            color: #ffffff;
        }
        
        .days {
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .folders {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .folder-tag {
            background-color: #2c2c2c;
            color: #cfcfcf;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            border: 1px solid #444;
        }

        /* Drobna poprawka dla bardzo małych ekranów (np. węższe telefony) */
        @media (max-width: 500px) {
            .back-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
            h1 {
                margin-top: 50px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Przycisk powrotu wyciągnięty z kontenera, żeby łatwiej pozycjonować go na całym ekranie -->
    <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        wróć do tv
    </a>

<div class="schedule-container">
    <h1>📺 ramówka transmisji</h1>
    <div id="schedule-list"></div>
</div>

<script>
    // Twoje dane JSON
    const scheduleData = [
      { "hour": 0, "folders": ["High School DxD", "High school of the dead"], "title": "Nocne Maratony (Codziennie)" },
      { "hour": 1, "folders": ["[Dodgy] Shrine of the Morning Mist [Web 720p]"], "title": "Nocne Tajemnice (Codziennie)" },
      { "hour": 2, "folders": ["[HorribleSubs] Lupin III Part I (01-23) [480p] (Batch)"], "title": "Lupin - Klasyka Nocą" },
      { "hour": 3, "folders": ["[HorribleSubs] Lupin III Part II (01-155) [480p] (Batch)"], "title": "Lupin - Klasyka Nocą cz. 2" },
      { "hour": 4, "folders": ["[HorribleSubs] Lupin III Part III (01-50) [480p] (Batch)"], "title": "Lupin - Klasyka Nocą cz. 3" },
      { "hour": 5, "folders": ["Extras"], "title": "Poranny Rozruch (Codziennie)" },
      { "hour": 6, "days": [1, 2, 3, 4, 5], "folders": ["azumanga"], "title": "Poranek z Azumangą (Pon-Pt)" },
      { "hour": 6, "days": [6, 7], "folders": ["flying witch"], "title": "Poranek z Magią (Sob-Nie)" },
      { "hour": 7, "folders": ["[F-R] One Piece 0001-0782 (Batch)"], "title": "One Piece - Śniadanie z Piratami" },
      { "hour": 8, "folders": ["[F-R] One Piece 0001-0782 (Batch)"], "title": "One Piece - Śniadanie z Piratami vol. 2" },
      { "hour": 9, "days": [1, 2, 3, 4, 5], "folders": ["Shikanoko Nokonoko Koshitantan"], "title": "Szkolne Absurdy (Pon-Pt)" },
      { "hour": 9, "days": [6, 7], "folders": ["Gekkan Shoujo Nozaki-kun"], "title": "Szkolne Absurdy (Sob-Nie)" },
      { "hour": 10, "folders": ["Ijiranaide, Nagatoro-san"], "title": "Przedpołudniowy Uśmiech (Codziennie)" },
      { "hour": 11, "folders": ["Youkoso_Jitsuryoku_Shijou_Shugi_no_Kyoushitsu"], "title": "Klasa Elity na Żywo (Codziennie)" },
      { "hour": 12, "folders": ["[HorribleSubs] Lupin III Part II (01-155) [480p] (Batch)"], "title": "Południe z Lupinem (Codziennie)" },
      { "hour": 13, "folders": ["[Dodgy] Star Ocean EX [BD 480p]"], "title": "Kosmiczna Przygoda (Codziennie)" },
      { "hour": 14, "folders": ["Seihou Bukyou Outlaw Star"], "title": "Outlaw Star Wczesnym Popołudniem" },
      { "hour": 15, "folders": ["[Dodgy] Shrine of the Morning Mist [Web 720p]"], "title": "Popołudniowa Tajemnica" },
      { "hour": 16, "days": [1, 2, 3, 4, 5], "folders": ["flying witch"], "title": "Magiczne Popołudnie (Pon-Pt)" },
      { "hour": 16, "days": [6, 7], "folders": ["Zombieland Saga S01 1080p Dual Audio BDRip 10 bits DD x265-EMBER"], "title": "Zombiakowy Weekend (Sob-Nie)" },
      { "hour": 17, "days": [1, 2, 3, 4, 5], "folders": ["Gekkan Shoujo Nozaki-kun"], "title": "Komediowy Chillout (Pon-Pt)" },
      { "hour": 17, "days": [6, 7], "folders": ["Zombieland Saga S02 1080p Dual Audio BDRip 10 bits DD x265-EMBER"], "title": "Zombiakowy Weekend S02 (Sob-Nie)" },
      { "hour": 18, "folders": ["aot s1 25 odcinków_small"], "title": "Wieczorne Emocje - Attack on Titan" },
      { "hour": 19, "folders": ["re zero"], "title": "Re:Zero - Wieczór w Innym Świecie" },
      { "hour": 20, "days": [1, 2, 3, 4, 5], "folders": ["initial D"], "title": "Prime Time: Eurobeat Drift (Pon-Pt)" },
      { "hour": 20, "days": [6, 7], "folders": ["aot s1 25 odcinków_small", "re zero"], "title": "Prime Time: Weekendowe Hity (Sob-Nie)" },
      { "hour": 21, "folders": ["[F-R] One Piece 0001-0782 (Batch)"], "title": "Wieczór z One Piece (Codziennie)" },
      { "hour": 22, "days": [1, 2, 3, 4, 5], "folders": ["High School DxD"], "title": "Nocne Pikanterie (Pon-Pt)" },
      { "hour": 22, "days": [6, 7], "folders": ["High school of the dead"], "title": "Nocne Pikanterie - Zombie (Sob-Nie)" },
      { "hour": 23, "folders": ["azumanga", "Shikanoko Nokonoko Koshitantan"], "title": "Późna Noc Komediowa (Codziennie)" }
    ];

    const scheduleList = document.getElementById('schedule-list');

    function formatTime(hour) {
        return `${hour.toString().padStart(2, '0')}:00`;
    }

    function getDaysLabel(days) {
        if (!days) return "codziennie";
        
        const isWeekdays = days.join(',') === '1,2,3,4,5';
        const isWeekend = days.join(',') === '6,7';
        
        if (isWeekdays) return "poniedziałek - piątek";
        if (isWeekend) return "sobota - niedziela";
        
        const dayNames = ["", "poniedziałek", "wtorek", "środa", "czwartek", "piątek", "sobota", "niedziela"];
        return days.map(d => dayNames[d]).join(', ');
    }

    scheduleData.forEach(item => {
        const el = document.createElement('div');
        el.className = 'schedule-item';
        
        const timeHTML = `<div class="time-block">${formatTime(item.hour)}</div>`;
        
        const foldersHTML = item.folders.map(folder => 
            `<span class="folder-tag">📁 ${folder}</span>`
        ).join('');
        
        const contentHTML = `
            <div class="content-block">
                <h3 class="title">${item.title}</h3>
                <div class="days">📅 ${getDaysLabel(item.days)}</div>
                <div class="folders">${foldersHTML}</div>
            </div>
        `;
        
        el.innerHTML = timeHTML + contentHTML;
        scheduleList.appendChild(el);
    });
</script>

</body>
</html>
