<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ramówka emisji</title>
    <link rel="icon" type="image/png" href="favicon2.png">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #bb86fc;
            --accent-hover: #9c4dff;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .schedule-container {
            max-width: 800px;
            width: 100%;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: var(--card-bg);
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid rgba(187, 134, 252, 0.3);
            transition: all 0.2s ease-in-out;
        }

        .back-btn:hover {
            background-color: var(--accent);
            color: #121212;
            transform: scale(1.05);
        }
        
        h1 {
            text-align: center;
            color: var(--accent);
            margin-top: 60px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .controls label {
            font-weight: bold;
            margin-right: 10px;
            color: var(--accent);
        }

        .controls input[type="date"] {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .controls input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(1) hue-rotate(200deg) saturate(5);
            cursor: pointer;
        }

        /* Ekran ładowania */
        #loading-screen {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--accent);
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        
        .schedule-item {
            background-color: var(--card-bg);
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease-in-out;
        }
        
        .schedule-item:hover {
            transform: translateX(5px);
            border-left: 4px solid var(--accent);
        }
        
        .time-block {
            background-color: var(--accent);
            color: #121212;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 20px;
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .content-block {
            padding: 15px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        
        .folders {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ep-info {
            background-color: #252525;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #444;
            word-break: break-all; 
        }
        
        .folder-tag {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .ep-name {
            color: #cfcfcf;
            font-size: 0.95rem;
            display: block;
            margin-left: 10px;
            margin-bottom: 4px;
        }

        .ep-name::before {
            content: "▶ ";
            color: var(--accent);
            font-size: 0.8rem;
        }

        @media (max-width: 500px) {
            .back-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
            h1 {
                margin-top: 50px;
                font-size: 1.5rem;
            }
            .time-block {
                min-width: 60px;
                font-size: 1.2rem;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        wróć do tv
    </a>

<div class="schedule-container">
    <h1>📺 ramówka transmisji</h1>
    
    <div class="controls">
        <label for="schedule-date">Wybierz dzień emisji:</label>
        <input type="date" id="schedule-date" disabled>
    </div>

    <div id="loading-screen">Trwa pobieranie bazy danych i symulowanie ramówki...</div>
    <div id="schedule-list"></div>
</div>

<script>
    let scheduleConfig = [];
    let videosDB = {};

    const scheduleList = document.getElementById('schedule-list');
    const dateInput = document.getElementById('schedule-date');
    const loadingScreen = document.getElementById('loading-screen');

    // --- ŁADOWANIE PLIKU CSV (skopiowane z index.html) ---
    async function loadCSV() {
        const res = await fetch("anime_lista.csv");
        const text = await res.text();
        const lines = text.trim().split('\n');
        const db = {};

        for(let i = 0; i < lines.length; i++) {
            const row = lines[i];
            if (!row.includes('";"')) continue;
            const cols = row.split('";"').map(s => s.replace(/^"|"$/g, ''));
            if (cols.length < 4) continue;

            const fullPath = cols[0];
            const fileName = cols[1];
            const ext = cols[2];
            const durationStr = cols[3]; 

            let durParts = durationStr.split(':').map(Number);
            let durSec = 0;
            if (durParts.length === 3) {
                durSec = durParts[0] * 3600 + durParts[1] * 60 + durParts[2];
            } else if (durParts.length === 2) {
                durSec = durParts[0] * 60 + durParts[1];
            }

            const folderName = fullPath.replace(/^C:\\videos\\/i, '').replace(/\\/g, '/');

            if (!db[folderName]) db[folderName] = [];
            db[folderName].push({
                file: fileName + ext,
                durationSec: durSec || 1440 
            });
        }
        return db;
    }

    // --- OBLICZANIE BLOKÓW (skopiowane z index.html) ---
    function getBlockEnd(startTimeSec, durationSec) {
        const endTimeSec = startTimeSec + durationSec;
        const startHour = Math.floor(startTimeSec / 3600);
        const endHour = Math.floor((endTimeSec - 1) / 3600); 

        if (endHour > startHour) {
            return (endHour + 1) * 3600;
        } else {
            const halfHourSec = startHour * 3600 + 1800;
            if (startTimeSec < halfHourSec && endTimeSec <= halfHourSec) {
                return halfHourSec;
            } else {
                return (startHour + 1) * 3600;
            }
        }
    }

        // --- LOGIKA SYMULACJI CAŁEGO DNIA ---
    function simulateFullDay(targetCycleDay) {
        let t = 0; 
        let series_state = {};
        for(let f in videosDB) {
            series_state[f] = { next_ep_idx: 0, finished: false };
        }

        const max_t = targetCycleDay * 86400; // Symulujemy tylko do końca zadanego dnia
        let events_for_day = {}; 

        while (t < max_t) {
            let day = Math.floor(t / 86400) + 1;
            let hour = Math.floor((t % 86400) / 3600);
            let dow = ((day - 1) % 7) + 1;

            let configConfigs = scheduleConfig.filter(x => x.hour === hour);
            let config = configConfigs.find(x => !x.days || x.days.includes(dow)) || configConfigs[0];

            if (!config) {
                t = Math.floor(t / 3600) * 3600 + 3600;
                continue;
            }

            let folders = config.folders || [config.folder];
            let valid_folders = folders.filter(f => videosDB[f] && videosDB[f].length > 0);

            if (valid_folders.length === 0) {
                t = Math.floor(t / 3600) * 3600 + 3600;
                continue;
            }

            let active_folder = null;
            for (let f of valid_folders) {
                if (!series_state[f]) series_state[f] = { next_ep_idx: 0, finished: false };
                if (!series_state[f].finished) {
                    active_folder = f;
                    break;
                }
            }

            if (!active_folder) {
                for (let f of valid_folders) {
                    series_state[f].next_ep_idx = 0;
                    series_state[f].finished = false;
                }
                active_folder = valid_folders[0];
            }

            let advanced_t = t;
            let f = active_folder;
            let db = videosDB[f];
            let total_eps = db.length;
            let state = series_state[f];
            let eps_to_play = [];

            if (total_eps === 1) {
                eps_to_play.push({ type: 'premiere', idx: 0 });
                state.finished = true;
            } else {
                if (state.next_ep_idx === 0) {
                    eps_to_play.push({ type: 'premiere', idx: 0 });
                    state.next_ep_idx++;
                } else if (state.next_ep_idx < total_eps) {
                    eps_to_play.push({ type: 'rerun', idx: state.next_ep_idx - 1 });
                    eps_to_play.push({ type: 'premiere', idx: state.next_ep_idx });
                    state.next_ep_idx++;
                } else if (state.next_ep_idx === total_eps) {
                    eps_to_play.push({ type: 'rerun', idx: state.next_ep_idx - 1 });
                    state.finished = true;
                }
            }

            for (let ep of eps_to_play) {
                let ep_info = db[ep.idx];
                let duration = ep_info.durationSec;
                let start_t = advanced_t;
                let block_end_t = getBlockEnd(start_t, duration);

                // --- DODANA LOGIKA Z INDEXU: Blokowanie nowej serii ---
                // Jeśli to ostatni włączany odcinek i seria właśnie otrzymała status "finished"
                if (ep === eps_to_play[eps_to_play.length - 1] && state.finished) {
                    let next_hour_t = Math.floor(t / 3600) * 3600 + 3600;
                    // Wymuś rozciągnięcie bloku do pełnej godziny (jeśli skończył się wcześniej)
                    if (block_end_t < next_hour_t) {
                        block_end_t = next_hour_t;
                    }
                }
                // ---------------------------------------------

                // Zapisujemy odcinek jeśli wypadł w poszukiwanym dniu
                if (day === targetCycleDay) {
                    if (!events_for_day[hour]) {
                        events_for_day[hour] = {
                            title: config.title || f,
                            episodes: []
                        };
                    }
                    events_for_day[hour].episodes.push({
                        folder: f,
                        file: ep_info.file,
                        type: ep.type,
                        idx: ep.idx
                    });
                }
                advanced_t = block_end_t;
            }

            if (advanced_t > t) {
                t = advanced_t; 
            } else {
                t = Math.floor(t / 3600) * 3600 + 3600; 
            }
        }

        return events_for_day;
    }
    

    function formatTime(hour) {
        return `${hour.toString().padStart(2, '0')}:00`;
    }

    function renderSchedule(targetDateString) {
        scheduleList.innerHTML = '';
        
        const [year, month, day] = targetDateString.split('-');
        const targetDate = new Date(year, month - 1, day);
        targetDate.setHours(0,0,0,0);
        
        // Obliczanie cyklu tak jak w TV
        const localEpochMs = targetDate.getTime() - (targetDate.getTimezoneOffset() * 60000);
        const cycleDay = (Math.floor(localEpochMs / 86400000) % 182) + 1;
        const currentDOW = ((cycleDay - 1) % 7) + 1; 

        // Odpalamy symulację
        const dailyEvents = simulateFullDay(cycleDay);

        // Renderowanie kafelków
        for(let hour = 0; hour < 24; hour++) {
            if (!dailyEvents[hour]) continue; // Pusta godzina (ambient) - pomijamy

            const block = dailyEvents[hour];
            const el = document.createElement('div');
            el.className = 'schedule-item';
            
            const timeHTML = `<div class="time-block">${formatTime(hour)}</div>`;
            
            // Grupowanie HTML odcinków wewnątrz folderu (dla estetyki)
            let playingHTML = '';
            
            // Proste grupowanie odcinków występujących jeden pod drugim
            let currentFolder = null;
            block.episodes.forEach((ep) => {
                if (ep.folder !== currentFolder) {
                    if (currentFolder !== null) playingHTML += `</div>`; // zamknij poprzedni
                    currentFolder = ep.folder;
                    playingHTML += `
                        <div class="ep-info">
                            <span class="folder-tag">${ep.folder}</span>
                    `;
                }
                
                // Przeliczanie sekund na minuty
                const durationMin = Math.round(ep.durationSec / 60);

                playingHTML += `
                    <span class="ep-name">
                        odc. ${ep.idx + 1} - ${ep.file} 
                        <span style="color: #999; font-size: 0.85rem; font-weight: normal; margin-left: 5px;">(${durationMin} min)</span>
                    </span>
                `;
            });
            if (currentFolder !== null) playingHTML += `</div>`; // zamknij ostatni folder
            
            const contentHTML = `
                <div class="content-block">
                    <h3 class="title">${block.title}</h3>
                    <div class="folders">${playingHTML}</div>
                </div>
            `;
            
            el.innerHTML = timeHTML + contentHTML;
            scheduleList.appendChild(el);
        }

        if (Object.keys(dailyEvents).length === 0) {
            scheduleList.innerHTML = `<div style="text-align:center; padding: 20px;">Brak danych do wyświetlenia (pusty dzień).</div>`;
        }

        // Debug info tak jak poprzednio
        const infoDiv = document.createElement('div');
        infoDiv.style.textAlign = 'center';
        infoDiv.style.color = '#555';
        infoDiv.style.marginTop = '25px';
        infoDiv.style.fontSize = '0.85rem';
        infoDiv.innerText = `TV Engine Sim - dzień cyklu: ${cycleDay}/182 | Dzień tyg. (DOW): ${currentDOW}`;
        scheduleList.appendChild(infoDiv);
    }

    // --- INICJALIZACJA ---
    async function init() {
        try {
            // 1. Pobranie danych json i csv
            const resSchedule = await fetch("ramowka.json");
            scheduleConfig = await resSchedule.json();
            videosDB = await loadCSV();

            // 2. Ustawienie dzisiejszej daty na wejściu i odblokowanie kalendarza
            const today = new Date();
            const localIsoDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            dateInput.value = localIsoDate;
            dateInput.disabled = false;
            
            loadingScreen.style.display = 'none';

            // 3. Pierwszy render
            renderSchedule(dateInput.value);

            // 4. Podpięcie nasłuchiwania zmian
            dateInput.addEventListener('change', (e) => {
                if (e.target.value) renderSchedule(e.target.value);
            });

        } catch (e) {
            console.error(e);
            loadingScreen.innerHTML = "BŁĄD ŁADOWANIA DANYCH 💀 Upewnij się, że ramowka.json oraz anime_lista.csv są dostępne na serwerze.";
            loadingScreen.style.color = "#ff4444";
        }
    }

    // Uruchom start skryptu
    init();
</script>
</body>
</html>
