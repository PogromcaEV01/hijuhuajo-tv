<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ramówka emisji</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #bb86fc;
            --accent-hover: #9c4dff;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .schedule-container {
            max-width: 800px;
            width: 100%;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: var(--card-bg);
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid rgba(187, 134, 252, 0.3);
            transition: all 0.2s ease-in-out;
        }

        .back-btn:hover {
            background-color: var(--accent);
            color: #121212;
            transform: scale(1.05);
        }
        
        h1 {
            text-align: center;
            color: var(--accent);
            margin-top: 60px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Sekcja wyboru daty */
        .controls {
            text-align: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .controls label {
            font-weight: bold;
            margin-right: 10px;
            color: var(--accent);
        }

        .controls input[type="date"] {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .controls input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(1) hue-rotate(200deg) saturate(5);
            cursor: pointer;
        }
        
        .schedule-item {
            background-color: var(--card-bg);
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease-in-out;
        }
        
        .schedule-item:hover {
            transform: translateX(5px);
            border-left: 4px solid var(--accent);
        }
        
        .time-block {
            background-color: var(--accent);
            color: #121212;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 20px;
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .content-block {
            padding: 15px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        
        .folders {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ep-info {
            background-color: #252525;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #444;
            /* Zabezpieczenie przed wychodzeniem bardzo długich nazw plików poza ekran */
            word-break: break-all; 
        }
        
        .folder-tag {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
        }

        .ep-name {
            color: #cfcfcf;
            font-size: 0.95rem;
            display: block;
            margin-left: 10px;
            margin-bottom: 4px;
        }

        .ep-name::before {
            content: "▶ ";
            color: var(--accent);
            font-size: 0.8rem;
        }

        @media (max-width: 500px) {
            .back-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
            h1 {
                margin-top: 50px;
                font-size: 1.5rem;
            }
            .time-block {
                min-width: 60px;
                font-size: 1.2rem;
                padding: 15px;
            }
        }
    </style>

      { "hour": 20, "days": [6, 7], "folders": ["aot s1 25 odcinków_small", "re zero"], "title": "Prime Time: Weekendowe Hity (Sob-Nie)" },
      { "hour": 21, "folders": ["[F-R] One Piece 0001-0782 (Batch)"], "title": "Wieczór z One Piece (Codziennie)" },
      { "hour": 22, "days": [1, 2, 3, 4, 5], "folders": ["High School DxD"], "title": "Nocne Pikanterie (Pon-Pt)" },
      { "hour": 22, "days": [6, 7], "folders": ["High school of the dead"], "title": "Nocne Pikanterie - Zombie (Sob-Nie)" },
      { "hour": 23, "folders": ["azumanga", "Shikanoko Nokonoko Koshitantan"], "title": "Późna Noc Komediowa (Codziennie)" }
    ];

    // ... tutaj wyżej kończy się Twoje scheduleData ...

    const scheduleList = document.getElementById('schedule-list');
    const dateInput = document.getElementById('schedule-date');
    
    // Ustawienie domyślnej daty na 'dzisiaj' w bezpiecznym formacie (YYYY-MM-DD)
    const today = new Date();
    const localIsoDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
    dateInput.value = localIsoDate;

    function formatTime(hour) {
        return `${hour.toString().padStart(2, '0')}:00`;
    }

    function renderSchedule(targetDateString) {
        scheduleList.innerHTML = '';
        
        // Bezpieczne parsowanie daty z kalendarza, odporne na przesunięcia czasowe
        const [year, month, day] = targetDateString.split('-');
        const targetDate = new Date(year, month - 1, day);
        targetDate.setHours(0,0,0,0);
        
        // --- LOGIKA SKOPIOWANA BEZPOŚREDNIO Z index.html ---
        // Obliczanie cyklu i wewnętrznego DOW na podstawie czasu Epoch
        const localEpochMs = targetDate.getTime() - (targetDate.getTimezoneOffset() * 60000);
        const cycleDay = (Math.floor(localEpochMs / 86400000) % 182) + 1;
        const currentDOW = ((cycleDay - 1) % 7) + 1; 
        
        const runsOnDOW = (cfg, dow) => !cfg.days || cfg.days.includes(dow);
        
        scheduleData.forEach(item => {
            if (!runsOnDOW(item, currentDOW)) return; // Ten blok nie leci tego dnia cyklu
            
            const seriesFolders = item.folders || [item.folder];
            const programKey = seriesFolders.join('|');
            
            // Płaskie łączenie odcinków z przypisanych folderów tak jak robi to TV
            let allEpisodes = [];
            for (const f of seriesFolders) {
                if (episodesDB[f]) {
                    episodesDB[f].forEach(fileName => {
                        allEpisodes.push({ folder: f, file: fileName });
                    });
                }
            }
            
            if (allEpisodes.length === 0) return;

            const programConfigs = scheduleData.filter(cfg => {
                const f = cfg.folders || [cfg.folder];
                return f.join('|') === programKey;
            });
            
            // Zliczanie historycznych emisji od pierwszego dnia cyklu do dzisiaj
            let totalPastEpisodes = 0;
            for (let d = 1; d < cycleDay; d++) {
                const dow = ((d - 1) % 7) + 1;
                for (const cfg of programConfigs) {
                    if (runsOnDOW(cfg, dow)) {
                        totalPastEpisodes++;
                    }
                }
            }
            
            const todaysConfigs = programConfigs.filter(cfg => runsOnDOW(cfg, currentDOW)).sort((a,b) => a.hour - b.hour);
            const H = todaysConfigs.length;
            const i = todaysConfigs.findIndex(cfg => cfg.hour === item.hour);
            
            // --- ODCINEK 1 (pierwsza połowa godziny) ---
            const slotIndex0 = i * 2 + 0;
            const targetIndex0 = totalPastEpisodes - H + slotIndex0;
            const safeIndex0 = ((targetIndex0 % allEpisodes.length) + allEpisodes.length) % allEpisodes.length;
            const ep0 = allEpisodes[safeIndex0];
            
            // --- ODCINEK 2 (druga połowa godziny) ---
            const slotIndex1 = i * 2 + 1;
            const targetIndex1 = totalPastEpisodes - H + slotIndex1;
            const safeIndex1 = ((targetIndex1 % allEpisodes.length) + allEpisodes.length) % allEpisodes.length;
            const ep1 = allEpisodes[safeIndex1];
            
            // --- RENDEROWANIE WIDOKU ---
            const el = document.createElement('div');
            el.className = 'schedule-item';
            
            const timeHTML = `<div class="time-block">${formatTime(item.hour)}</div>`;
            
            let playingHTML = '';
            
            // Estetyczne zgrupowanie, jeśli oba odcinki bloku pochodzą z tego samego folderu
            if (ep0 && ep1 && ep0.folder === ep1.folder) {
                playingHTML += `
                    <div class="ep-info">
                        <span class="folder-tag">${ep0.folder}</span>
                        <span class="ep-name">${ep0.file}</span>
                        <span class="ep-name">${ep1.file}</span>
                    </div>`;
            } else {
                if (ep0) {
                    playingHTML += `
                        <div class="ep-info">
                            <span class="folder-tag">${ep0.folder}</span>
                            <span class="ep-name">${ep0.file}</span>
                        </div>`;
                }
                if (ep1) {
                    playingHTML += `
                        <div class="ep-info">
                            <span class="folder-tag">${ep1.folder}</span>
                            <span class="ep-name">${ep1.file}</span>
                        </div>`;
                }
            }
            
            const contentHTML = `
                <div class="content-block">
                    <h3 class="title">${item.title}</h3>
                    <div class="folders">${playingHTML}</div>
                </div>
            `;
            
            el.innerHTML = timeHTML + contentHTML;
            scheduleList.appendChild(el);
        });

        // Debug info na dole pokazujące jak przeliczył się czas Unix
        const infoDiv = document.createElement('div');
        infoDiv.style.textAlign = 'center';
        infoDiv.style.color = '#555';
        infoDiv.style.marginTop = '25px';
        infoDiv.style.fontSize = '0.85rem';
        infoDiv.innerText = `Symulacja wewnętrzna TV - dzień cyklu: ${cycleDay}/182 | DOW: ${currentDOW}`;
        scheduleList.appendChild(infoDiv);
    }

    // Nasłuchiwanie zmian w kalendarzu
    dateInput.addEventListener('change', (e) => {
        renderSchedule(e.target.value);
    });
    
    // Odpalenie po załadowaniu strony
    renderSchedule(dateInput.value);
</script>
